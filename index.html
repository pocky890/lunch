<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>午餐決策大賽</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg0:#f2f2f7; --bg1:#ffffff; --bg2:#f5f5f7;
      --bd1:rgba(0,0,0,0.08); --bd2:rgba(0,0,0,0.18);
      --t1:#1c1c1e; --t2:#636366; --t3:#aeaeb2;
      --r:10px; --rl:14px; --accent:#5856D6;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg0:#1c1c1e; --bg1:#2c2c2e; --bg2:#3a3a3c; --bd1:rgba(255,255,255,0.08); --bd2:rgba(255,255,255,0.18); --t1:#f2f2f7; --t2:#aeaeb2; --t3:#636366; }
      input, select { background: var(--bg2) !important; color: var(--t1) !important; }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg0); min-height: 100vh; color: var(--t1); font-size: 16px; }
    h2 { font-size: 26px; font-weight: 600; }
    p  { font-size: 15px; color: var(--t2); margin-top: 4px; }
    input, select { display: block; width: 100%; padding: 13px 15px; border: 1px solid var(--bd2); border-radius: var(--r); font-size: 16px; background: var(--bg1); color: var(--t1); outline: none; margin-bottom: 14px; transition: border-color .15s; }
    input:focus, select:focus { border-color: var(--accent); }
    label { display: block; font-size: 14px; font-weight: 500; color: var(--t2); margin-bottom: 6px; }
    button { display: block; width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: var(--r); font-size: 17px; font-weight: 600; background: var(--accent); color: #fff; cursor: pointer; transition: opacity .15s; }
    button:hover { opacity: .88; }
    .ghost { background: transparent !important; border: 1px solid var(--bd2) !important; color: var(--t2) !important; font-weight: 400 !important; }
    .card { background: var(--bg1); border: 1px solid var(--bd1); border-radius: var(--rl); padding: 1.4rem; }
    .page { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem; }
    .gap { margin-top: 1rem; }
    .row { display: flex; gap: 8px; }
    .badge-solo { font-size: 12px; background: #FAEEDA; color: #633806; padding: 2px 8px; border-radius: 5px; margin-top: 4px; font-weight: 600; }
  </style>
</head>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

firebase.initializeApp(FIREBASE_CONFIG);
const db   = firebase.database();
const fRef = p => db.ref(p);
const fGet = p => fRef(p).once("value").then(s => s.val());
const fSet = (p, v) => fRef(p).set(v);

const CATEGORIES  = ["台式麵飯","日式","輕食早午餐","異國料理","火鍋","速食"];
const CAT_EMOJI   = {"台式麵飯":"🍜","日式":"🍣","輕食早午餐":"🥪","異國料理":"🌏","火鍋":"🍲","速食":"🍔"};
const DEFAULT_RESTS = {
  "台式麵飯": ["奇味牛肉麵《張瑋記》","正群川味牛肉麵館","南北福州干拌麵","瑪岌牛肉麵","麵家紅葉軒","牛燒味","阿土小羊肉","黃海鮮","三商巧福","鬍鬚張","雞肉飯","好友鵝肉","新悅鵝肉"],
  "日式":     ["一幸拉麵","爭鮮迴轉壽司","鮮五丼"],
  "輕食早午餐":["初早午餐","路易莎咖啡","Q Burger","麥味登","Subway","弄堂里香"],
  "異國料理": ["愛上越南","薩莉亞","雲南傣族小吃店","上富豐蘇杭湯包"],
  "火鍋":     ["三媽臭臭鍋","錢都","燒石鼎石頭小火鍋"],
  "速食":     ["麥當勞","摩斯","PizzaHut"]
};
const RAMPS = [
  {bg:"#EEEDFE",bd:"#7F77DD",tx:"#3C3489"},{bg:"#E1F5EE",bd:"#1D9E75",tx:"#085041"},
  {bg:"#FAECE7",bd:"#D85A30",tx:"#712B13"},{bg:"#FBEAF0",bd:"#D4537E",tx:"#4B1528"},
  {bg:"#E6F1FB",bd:"#378ADD",tx:"#0C447C"},{bg:"#FAEEDA",bd:"#BA7517",tx:"#633806"},
  {bg:"#EAF3DE",bd:"#639922",tx:"#27500A"},{bg:"#FCEBEB",bd:"#E24B4A",tx:"#791F1F"},
];
const WDAYS = ["週一","週二","週三","週四","週五"];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function isDeadlinePassed(dl) {
  const now = new Date(), [h,m] = dl.split(":").map(Number);
  return now.getHours() > h || (now.getHours() === h && now.getMinutes() >= m);
}
function calcCountdown(dl) {
  const now = new Date(), [h,m] = dl.split(":").map(Number);
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  const diff = Math.max(0, target - now);
  return `${String(Math.floor(diff/60000)).padStart(2,"0")}:${String(Math.floor((diff%60000)/1000)).padStart(2,"0")}`;
}
function getWeekDates() {
  const today = new Date(), dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate() - (dow===0?6:dow-1));
  return Array.from({length:5}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; });
}
function snapToArr(val) { return Object.values(val||{}).sort((a,b)=>a.joinedAt-b.joinedAt); }
function mergeRests(custObj) {
  const m = {};
  for (const cat of CATEGORIES) { const c = Object.values(custObj?.[cat]||{}); m[cat] = [...new Set([...DEFAULT_RESTS[cat],...c])]; }
  return m;
}

async function getOrDrawNumber(dateStr) {
  let drawn = null;
  await fRef(`lunch/drawn/${dateStr}`).transaction(current => {
    if (current !== null) { drawn = current; return; }
    drawn = Math.floor(Math.random() * 90) + 10;
    return drawn;
  });
  if (drawn === null) drawn = await fGet(`lunch/drawn/${dateStr}`);
  return drawn;
}
function determineResult(pts, drawnNumber) {
  if (!pts || pts.length === 0) return null;
  const exact = pts.find(p => p.number === drawnNumber);
  if (exact) return { winner: exact, soloWin: true, sorted: pts };
  const sorted = [...pts].sort((a,b) => {
    const da = Math.abs(a.number-drawnNumber), db = Math.abs(b.number-drawnNumber);
    return da !== db ? da - db : a.number - b.number;
  });
  return { winner: sorted[0], soloWin: false, sorted };
}

function StatsPanel({weekly}) {
  const chartRef = useRef(null);
  const chartInstanceRef = useRef(null);
  const allRecords = Object.entries(weekly);

  const restCounts = {};
  allRecords.forEach(([, rec]) => {
    if (rec?.rest) restCounts[rec.rest] = (restCounts[rec.rest] || 0) + 1;
  });
  const sortedRests = Object.entries(restCounts).sort((a,b) => b[1]-a[1]);

  const soloMap = {};
  allRecords.forEach(([date, rec]) => {
    if (rec?.soloWin && rec.winner) {
      if (!soloMap[rec.winner]) soloMap[rec.winner] = [];
      soloMap[rec.winner].push(date);
    }
  });
  const sortedSolo = Object.entries(soloMap).sort((a,b) => b[1].length - a[1].length);

  const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const BAR_COLORS = isDark
    ? ["#818CF8","#34D399","#FB923C","#60A5FA","#F472B6","#FBBF24","#86EFAC","#F87171"]
    : ["#4338CA","#059669","#C2410C","#1D4ED8","#BE185D","#B45309","#15803D","#DC2626"];
  const tickColor = isDark ? "#aeaeb2" : "#3a3a3c";
  const gridColor = isDark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.08)";

  useEffect(() => {
    if (!chartRef.current || sortedRests.length === 0) return;
    if (chartInstanceRef.current) { chartInstanceRef.current.destroy(); chartInstanceRef.current = null; }
    chartInstanceRef.current = new Chart(chartRef.current, {
      type: "bar",
      data: {
        labels: sortedRests.map(([r]) => r),
        datasets: [{
          data: sortedRests.map(([,c]) => c),
          backgroundColor: sortedRests.map((_,i) => BAR_COLORS[i%BAR_COLORS.length]),
          borderColor:     sortedRests.map((_,i) => BAR_COLORS[i%BAR_COLORS.length]),
          borderWidth: 0, borderRadius: 6,
        }]
      },
      options: {
        indexAxis: "y", responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.raw} 次` } }
        },
        scales: {
          x: { beginAtZero: true, ticks: { stepSize: 1, precision: 0, color: tickColor }, grid: { color: gridColor } },
          y: { ticks: { font: { size: 13, weight: "600" }, color: tickColor }, grid: { display: false } }
        }
      }
    });
    return () => { if (chartInstanceRef.current) { chartInstanceRef.current.destroy(); chartInstanceRef.current = null; } };
  }, [JSON.stringify(sortedRests)]);

  function fmtDate(ds) { const [,m,d] = ds.split("-"); return `${parseInt(m)}/${parseInt(d)}`; }

  return (
    <div style={{marginTop:"1rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
      <div className="card">
        <p style={{fontSize:"15px",fontWeight:"700",marginTop:0,marginBottom:"14px",color:"var(--t1)"}}>店家中選次數</p>
        {sortedRests.length === 0
          ? <p style={{textAlign:"center",color:"var(--t3)"}}>尚無紀錄</p>
          : <div style={{height:`${Math.max(120, sortedRests.length*50)}px`,position:"relative"}}>
              <canvas ref={chartRef} />
            </div>
        }
      </div>
      <div className="card">
        <p style={{fontSize:"15px",fontWeight:"700",marginTop:0,marginBottom:"14px",color:"var(--t1)"}}>獨贏紀錄</p>
        {sortedSolo.length === 0
          ? <p style={{textAlign:"center",color:"var(--t3)"}}>尚無獨贏紀錄</p>
          : sortedSolo.map(([name, dates]) => (
              <div key={name} style={{display:"flex",alignItems:"flex-start",gap:"12px",marginBottom:"14px"}}>
                <div style={{minWidth:"72px",flexShrink:0}}>
                  <div style={{fontSize:"17px",fontWeight:"700",color:"var(--t1)"}}>{name}</div>
                  <div style={{fontSize:"14px",fontWeight:"700",color:"#E8610A",marginTop:"2px"}}>{dates.length} 次</div>
                </div>
                <div style={{flex:1,display:"flex",flexWrap:"wrap",gap:"5px",paddingTop:"4px"}}>
                  {[...dates].sort().map(d => (
                    <span key={d} style={{background:"#FAEEDA",border:"1px solid #BA7517",color:"#633806",borderRadius:"5px",padding:"3px 9px",fontSize:"13px",fontWeight:"600"}}>{fmtDate(d)}</span>
                  ))}
                </div>
              </div>
            ))
        }
      </div>
    </div>
  );
}

function App() {
  const [phase,      setPhase]      = useState("loading");
  const [sess,       setSess]       = useState(null);
  const [pts,        setPts]        = useState([]);
  const [rests,      setRests]      = useState(mergeRests(null));
  const [weekly,     setWeekly]     = useState({});
  const [form,       setForm]       = useState({name:"",category:"",rest:"",cust:"",number:"",deadline:"11:50"});
  const [result,     setResult]     = useState(null);
  const [cd,         setCd]         = useState("--:--");
  const [numWarn,    setNumWarn]    = useState("");
  const [resetModal, setResetModal] = useState(false);
  const [resetPw,    setResetPw]    = useState("");
  const [resetErr,   setResetErr]   = useState("");
  const [showStats,  setShowStats]  = useState(false);
  const sessRef  = useRef(null);
  const savedRef = useRef(false);
  const timerRef = useRef(null);

  useEffect(() => { sessRef.current = sess; }, [sess]);

  useEffect(() => {
    Promise.all([fGet("lunch/session"),fGet("lunch/restaurants"),fGet("lunch/weekly"),fGet("lunch/participants")])
    .then(async ([s,custR,w,ptsObj]) => {
      setRests(mergeRests(custR)); setWeekly(w||{});
      const today = todayStr();
      if (!s || s.date !== today) { setPhase("setup"); return; }
      const p = snapToArr(ptsObj); setSess(s); setPts(p);
      if (isDeadlinePassed(s.deadline)) {
        const drawn = await getOrDrawNumber(today);
        const res = determineResult(p, drawn);
        setResult(res ? {...res, drawnNumber: drawn} : {drawnNumber: drawn, winner: null, soloWin: false, sorted: p});
        setPhase("results");
      } else { setPhase("join"); }
    }).catch(() => setPhase("setup"));
  }, []);

  useEffect(() => {
    if (phase!=="join" && phase!=="joined") return;
    const pRef = fRef("lunch/participants");
    const handler = snap => setPts(snapToArr(snap.val()));
    pRef.on("value", handler);
    return () => pRef.off("value", handler);
  }, [phase]);

  useEffect(() => {
    if (!sess || (phase!=="join" && phase!=="joined")) return;
    setCd(calcCountdown(sess.deadline));
    timerRef.current = setInterval(async () => {
      const dl = sessRef.current?.deadline; if (!dl) return;
      setCd(calcCountdown(dl));
      if (isDeadlinePassed(dl)) {
        clearInterval(timerRef.current);
        const ptsObj = await fGet("lunch/participants");
        const finalPts = snapToArr(ptsObj);
        const drawn = await getOrDrawNumber(todayStr());
        const res = determineResult(finalPts, drawn);
        setResult(res ? {...res,drawnNumber:drawn} : {drawnNumber:drawn,winner:null,soloWin:false,sorted:finalPts});
        setPts(finalPts); setPhase("results");
      }
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, sess]);

  useEffect(() => {
    if (phase!=="results"||!result?.winner||savedRef.current) return;
    savedRef.current = true;
    const today = todayStr();
    fGet("lunch/weekly").then(async w => {
      if ((w||{})[today]) { setWeekly(w); return; }
      const nw = {...(w||{}), [today]: {winner:result.winner.name, rest:result.winner.rest, soloWin:result.soloWin, drawnNumber:result.drawnNumber}};
      await fSet("lunch/weekly", nw); setWeekly(nw);
    });
  }, [phase, result]);

  async function doSetup() {
    if (!/^\d{2}:\d{2}$/.test(form.deadline)) return alert("請輸入正確時間格式 HH:MM");
    if (isDeadlinePassed(form.deadline)) return alert("截止時間已過！請設定未來的時間");
    const s = {deadline:form.deadline, date:todayStr()};
    await fSet("lunch/session", s); await fSet("lunch/participants", null);
    setSess(s); setPts([]); setResult(null); setPhase("join");
  }

  async function doJoin() {
    const name = form.name.trim();
    if (!name) return alert("請輸入姓名");
    if (!form.category) return alert("請選擇餐廳類型");
    const rest = form.rest==="cust" ? form.cust.trim() : form.rest;
    if (!rest) return alert("請選擇或輸入店家");
    const num = parseInt(form.number);
    if (!num || num < 10 || num > 99) return alert("請輸入 10 到 99 之間的整數");
    const s = await fGet("lunch/session");
    if (!s || isDeadlinePassed(s.deadline)) return alert("已超過截止時間！");
    const ptsObj = await fGet("lunch/participants");
    const existing = snapToArr(ptsObj);
    if (existing.some(p=>p.name===name)) { setPts(existing); setPhase("joined"); return; }
    if (existing.some(p=>p.number===num)) { setNumWarn(`數字 ${num} 已被選走！請換一個`); return; }
    const newRef = fRef("lunch/participants").push();
    await newRef.set({id:newRef.key, name, category:form.category, rest, number:num, joinedAt:Date.now()});
    if (form.rest==="cust" && rest && !DEFAULT_RESTS[form.category]?.includes(rest)) {
      await fRef(`lunch/restaurants/${form.category}`).push(rest);
      setRests(r => ({...r, [form.category]: [...new Set([...(r[form.category]||[]), rest])]}));
    }
    setPhase("joined");
  }

  async function doReset() {
    await fSet("lunch/session", null); await fSet("lunch/participants", null);
    savedRef.current = false;
    setSess(null); setPts([]); setResult(null); setCd("--:--");
    setForm({name:"",category:"",rest:"",cust:"",number:"",deadline:"11:50"});
    setPhase("setup");
  }
  function openReset() { setResetModal(true); setResetPw(""); setResetErr(""); }

  function PasswordModal() {
    if (!resetModal) return null;
    async function confirm() {
      if (resetPw !== ADMIN_PASSWORD) { setResetErr("密碼錯誤！"); return; }
      setResetModal(false); await doReset();
    }
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
        <div style={{background:"var(--bg1)",border:"1px solid var(--bd1)",borderRadius:"var(--rl)",padding:"1.5rem",width:"300px",maxWidth:"90vw"}}>
          <h2 style={{marginBottom:"4px",fontSize:"18px"}}>管理員驗證</h2>
          <p style={{marginBottom:"1rem"}}>輸入密碼才能重設今天的遊戲</p>
          <input type="password" value={resetPw} onChange={e=>setResetPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirm()} placeholder="輸入密碼" autoFocus />
          {resetErr && <p style={{color:"#E24B4A",marginBottom:"8px",marginTop:"-4px"}}>{resetErr}</p>}
          <button onClick={confirm}>確認</button>
          <button className="ghost" onClick={()=>setResetModal(false)}>取消</button>
        </div>
      </div>
    );
  }

  function WeeklyRecord() {
    const weekDates = getWeekDates(), today = todayStr();
    async function clearWeekly() {
      const pw = window.prompt("請輸入管理員密碼");
      if (pw === null) return;
      if (pw !== ADMIN_PASSWORD) { alert("密碼錯誤！"); return; }
      await fSet("lunch/weekly", null);
      setWeekly({});
    }
    return (
      <div className="card gap">
        <div style={{display:"flex",alignItems:"center",marginBottom:"14px",gap:"6px"}}>
          <p style={{fontSize:"15px",fontWeight:"600",marginTop:0,flex:1}}>本週午餐紀錄</p>
          <button onClick={()=>setShowStats(s=>!s)} style={{width:"auto",padding:"5px 12px",fontSize:"13px",fontWeight:"500",marginBottom:0,background:showStats?"var(--accent)":"transparent",border:`1px solid ${showStats?"var(--accent)":"var(--bd2)"}`,color:showStats?"#fff":"var(--t2)",borderRadius:"6px"}}>
            {showStats ? "▲ 收起統計" : "▼ 查看統計"}
          </button>
          <button onClick={clearWeekly} style={{width:"auto",padding:"5px 12px",fontSize:"13px",fontWeight:"400",marginBottom:0,background:"transparent",border:"1px solid var(--bd2)",color:"var(--t3)",borderRadius:"6px"}}>清除紀錄</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
          {weekDates.map((date,i) => {
            const rec = weekly[date], isToday = date===today;
            return (
              <div key={date} style={{display:"flex",alignItems:"center",padding:"12px 14px",background:isToday?"var(--bg2)":"transparent",border:`1px solid ${isToday?"var(--bd2)":"var(--bd1)"}`,borderRadius:"var(--r)",borderLeft:`3px solid ${isToday?"var(--accent)":"transparent"}`}}>
                <div style={{width:"38px",flexShrink:0,fontSize:"15px",fontWeight:isToday?"700":"400",color:isToday?"var(--accent)":"var(--t3)"}}>{WDAYS[i]}</div>
                {rec ? (
                  <div style={{flex:1,marginLeft:"10px",minWidth:0}}>
                    <div style={{fontSize:"17px",fontWeight:"700",color:"var(--t1)",lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {rec.soloWin ? rec.winner : rec.rest}
                    </div>
                    <div style={{fontSize:"14px",color:"var(--t2)",marginTop:"2px",display:"flex",alignItems:"center",gap:"6px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {rec.soloWin ? rec.rest : rec.winner}
                      {rec.soloWin && <span className="badge-solo">獨贏</span>}
                    </div>
                  </div>
                ) : (
                  <div style={{flex:1,marginLeft:"10px",fontSize:"16px",color:"var(--t3)"}}>—</div>
                )}
                {rec?.drawnNumber ? (
                  <div style={{fontSize:"30px",fontWeight:"800",color:"#E8610A",fontVariantNumeric:"tabular-nums",marginLeft:"10px",minWidth:"52px",textAlign:"right",lineHeight:1,flexShrink:0}}>
                    #{rec.drawnNumber}
                  </div>
                ) : <div style={{minWidth:"52px"}} />}
              </div>
            );
          })}
        </div>
        {showStats && <StatsPanel weekly={weekly} />}
      </div>
    );
  }

  function HeaderBar() {
    return (
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:"8px",marginBottom:"1rem"}}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--bd1)",borderRadius:"var(--r)",padding:"10px 14px",fontSize:"15px",color:"var(--t2)"}}>截止 <strong style={{color:"var(--t1)"}}>{sess?.deadline}</strong></div>
        <div style={{background:"var(--bg2)",border:"1px solid var(--bd1)",borderRadius:"var(--r)",padding:"10px 14px",fontSize:"15px",color:"var(--t2)"}}>已加入 <strong style={{color:"var(--t1)"}}>{pts.length}</strong> 人</div>
        <div style={{background:"var(--bg2)",border:"1px solid var(--bd1)",borderRadius:"var(--r)",padding:"10px 14px",fontSize:"24px",fontWeight:"600",color:"var(--t1)",fontVariantNumeric:"tabular-nums",letterSpacing:"2px",whiteSpace:"nowrap"}}>{cd}</div>
      </div>
    );
  }

  function PtList({list}) {
    return (
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        {list.map((p,i) => {
          const ramp = RAMPS[i%RAMPS.length];
          return (
            <div key={p.id||i} style={{display:"flex",alignItems:"center",padding:"12px 16px",background:ramp.bg,border:`1px solid ${ramp.bd}`,borderRadius:"var(--r)"}}>
              <span style={{flex:1,fontWeight:"600",fontSize:"16px",color:ramp.tx}}>{p.name}</span>
              <span style={{fontSize:"14px",color:ramp.tx,opacity:0.8,marginRight:"12px"}}>{CAT_EMOJI[p.category]||""} {p.rest}</span>
              <span style={{fontSize:"20px",fontWeight:"700",color:ramp.tx,minWidth:"36px",textAlign:"right"}}>#{p.number}</span>
            </div>
          );
        })}
      </div>
    );
  }

  const takenNums = pts.map(p=>({num:p.number,name:p.name})).filter(x=>x.num);

  if (phase==="loading") return <div className="page"><p style={{textAlign:"center",paddingTop:"3rem"}}>載入中...</p></div>;

  if (phase==="setup") return (
    <div className="page"><PasswordModal />
      <h2>午餐決策大賽</h2><p>設定截止時間，到時自動抽號開獎</p>
      <div className="card gap">
        <label>今天幾點截止？</label>
        <input type="time" value={form.deadline} onChange={e=>setForm({...form,deadline:e.target.value})} />
        <button onClick={doSetup}>建立今天的遊戲 →</button>
      </div>
      <WeeklyRecord />
    </div>
  );

  if (phase==="join") return (
    <div className="page"><PasswordModal />
      <h2>填寫資料</h2><p style={{marginBottom:"1rem"}}>截止前填寫，時間到自動開獎</p>
      <HeaderBar />
      <div className="card">
        <label>你的名字</label>
        <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="輸入姓名" />

        <label>餐廳類型</label>
        <select value={form.category} onChange={e=>setForm({...form,category:e.target.value,rest:"",cust:""})} style={{marginBottom:form.category?"6px":"12px"}}>
          <option value="">— 請選擇類型 —</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{CAT_EMOJI[c]} {c}</option>)}
        </select>

        {form.category && (<>
          <label>想吃的店家</label>
          <select value={form.rest} onChange={e=>setForm({...form,rest:e.target.value,cust:""})} style={{marginBottom:form.rest==="cust"?"6px":"12px"}}>
            <option value="">— 請選擇店家 —</option>
            {(rests[form.category]||[]).map(r=><option key={r} value={r}>{r}</option>)}
            <option value="cust">＋ 其他（自行輸入，下次會出現在選單）</option>
          </select>
          {form.rest==="cust" && <input value={form.cust} onChange={e=>setForm({...form,cust:e.target.value})} placeholder="輸入店家名稱" />}
        </>)}

        <label>選一個號碼（10 ~ 99，不可重複）</label>
        <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
          <div style={{flex:"0 0 110px"}}>
            <input type="number" min={10} max={99} value={form.number}
              onChange={e=>{setForm({...form,number:e.target.value});setNumWarn("");}}
              placeholder="10 ~ 99" style={{marginBottom:"4px"}} />
            {numWarn && <p style={{color:"#E24B4A",fontSize:"12px",marginTop:0,marginBottom:"8px"}}>{numWarn}</p>}
          </div>
          <div style={{flex:1,paddingTop:"2px"}}>
            <p style={{fontSize:"11px",color:"var(--t3)",marginTop:0,marginBottom:"6px"}}>已被選走</p>
            {takenNums.length===0
              ? <p style={{fontSize:"12px",color:"var(--t3)",marginTop:0}}>（尚無人選）</p>
              : <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                  {takenNums.map(({num,name})=>(
                    <span key={num} style={{background:"var(--bg2)",border:"1px solid var(--bd2)",borderRadius:"6px",padding:"2px 7px",fontSize:"12px",color:"var(--t2)",whiteSpace:"nowrap"}}>
                      {num} <span style={{color:"var(--t3)"}}>({name})</span>
                    </span>
                  ))}
                </div>}
          </div>
        </div>

        <button onClick={doJoin}>確認加入 →</button>
        <button className="ghost" onClick={openReset}>重新設定時間</button>
      </div>
      {pts.length>0 && <div className="gap"><PtList list={pts} /></div>}
      <WeeklyRecord />
    </div>
  );

  if (phase==="joined") return (
    <div className="page"><PasswordModal />
      <h2>等待截止時間...</h2><p style={{marginBottom:"1rem"}}>時間到自動開獎</p>
      <HeaderBar /><PtList list={pts} /><WeeklyRecord />
    </div>
  );

  if (phase==="results") {
    if (!result?.winner || pts.length < 2) return (
      <div className="page"><PasswordModal />
        <h2>時間到！</h2><p style={{marginBottom:"1.5rem"}}>今天只有 {pts.length} 人參加，無法開獎</p>
        <button className="ghost" onClick={openReset}>重新開始</button>
        <WeeklyRecord />
      </div>
    );
    const {winner, soloWin, drawnNumber, sorted} = result;
    const allSorted = sorted || pts;
    const maxTotal = (pts.length-1)*50;
    return (
      <div className="page"><PasswordModal />
        <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
          <p style={{marginTop:0,marginBottom:"6px",fontSize:"14px",letterSpacing:"1px",textTransform:"uppercase",color:"var(--t3)"}}>今天的號碼</p>
          <div style={{fontSize:"96px",fontWeight:"700",lineHeight:1,color:"var(--accent)",fontVariantNumeric:"tabular-nums"}}>{drawnNumber}</div>
        </div>

        {soloWin ? (<>
          <div style={{background:"#FAEEDA",border:"2px solid #BA7517",borderRadius:"var(--rl)",padding:"1.5rem",marginBottom:"1rem",textAlign:"center"}}>
            <div style={{fontSize:"14px",color:"#633806",marginBottom:"8px",fontWeight:"600",letterSpacing:"0.5px"}}>完全命中！獨贏！</div>
            <div style={{fontSize:"32px",fontWeight:"800",color:"#412402",lineHeight:1.2}}>{winner.name}</div>
            <div style={{fontSize:"18px",color:"#633806",marginTop:"10px"}}>{CAT_EMOJI[winner.category]} {winner.rest}</div>
          </div>
          <div className="card" style={{marginBottom:"1rem",textAlign:"center"}}>
            <p style={{marginTop:0,marginBottom:"6px",fontSize:"15px"}}>請客方案</p>
            <p style={{fontSize:"17px",color:"var(--t1)"}}>每人最多出 <strong>50 元</strong></p>
            <p style={{marginTop:"4px",fontSize:"15px"}}>共 {pts.length-1} 人，上限共 {maxTotal} 元</p>
          </div>
        </>) : (<>
          <div style={{background:"#E1F5EE",border:"2px solid #1D9E75",borderRadius:"var(--rl)",padding:"1.5rem",marginBottom:"1rem",textAlign:"center"}}>
            <div style={{fontSize:"14px",color:"#085041",marginBottom:"8px",fontWeight:"600",letterSpacing:"0.5px"}}>最接近！各自付帳</div>
            <div style={{fontSize:"36px",fontWeight:"800",color:"#04342C",lineHeight:1.2}}>{CAT_EMOJI[winner.category]} {winner.rest}</div>
            <div style={{fontSize:"17px",color:"#1D9E75",marginTop:"10px"}}>由 <strong style={{color:"#04342C"}}>{winner.name}</strong> 選的</div>
          </div>
        </>)}

        <div className="card" style={{marginBottom:"1rem"}}>
          <p style={{fontSize:"14px",fontWeight:"600",letterSpacing:"0.5px",marginBottom:"12px",marginTop:0}}>本次排名</p>
          {allSorted.map((p,i) => {
            const dist = Math.abs(p.number - drawnNumber);
            const isWinner = p.id === winner.id;
            const rampIdx = pts.findIndex(x=>x.id===p.id);
            const ramp = RAMPS[rampIdx%RAMPS.length];
            return (
              <div key={p.id} style={{display:"flex",alignItems:"center",padding:"10px 12px",background:isWinner?ramp.bg:"transparent",border:isWinner?`1px solid ${ramp.bd}`:"1px solid transparent",borderRadius:"var(--r)",marginBottom:"4px"}}>
                <span style={{fontSize:"15px",color:"var(--t3)",width:"26px"}}>{i+1}</span>
                <span style={{flex:1,fontWeight:isWinner?"700":"400",fontSize:"16px",color:isWinner?ramp.tx:"var(--t1)"}}>{p.name}</span>
                <span style={{fontSize:"17px",fontWeight:"600",color:isWinner?ramp.tx:"var(--t2)",marginRight:"10px"}}>#{p.number}</span>
                <span style={{fontSize:"14px",color:isWinner?ramp.tx:"var(--t3)",minWidth:"64px",textAlign:"right"}}>
                  {dist===0 ? "🎯 命中" : `距離 ${dist}`}
                </span>
              </div>
            );
          })}
        </div>

        <button className="ghost" onClick={openReset}>重新開始</button>
        <WeeklyRecord />
      </div>
    );
  }

  return null;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
