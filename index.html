const CAT_EMOJI   = {"台式麵飯":"🍜","日式":"🍣","輕食早午餐":"🥪","異國料理":"🌏","火鍋":"🍲","速食":"🍔","其它":"🍽️"};

  "台式麵飯": ["奇味牛肉麵《張瑋記》","正群川味牛肉麵館","南北福州干拌麵","瑪岌牛肉麵","麵家紅葉軒","牛燒味","阿土小羊肉","黃海鮮","三商巧福","鬍鬚張","雞肉飯","好友鵝肉","新悅鵝肉"],
  "日式":     ["一幸拉麵","爭鮮迴轉壽司","鮮五丼"],

};

const RAMPS = [
  {bg:"#EEF2FF",bd:"#C7D2FE",tx:"#3730A3"}, {bg:"#ECFDF5",bd:"#A7F3D0",tx:"#065F46"},
  {bg:"#FFFBEB",bd:"#FDE68A",tx:"#92400E"}, {bg:"#FDF2F8",bd:"#FBCFE8",tx:"#831843"},

];
const WDAYS = ["週一","週二","週三","週四","週五"];

/* ── Pure logic ── */
function todayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function isDeadlinePassed(dl) { const now = new Date(), [h,m] = dl.split(":").map(Number); return now.getHours() > h || (now.getHours() === h && now.getMinutes() >= m); }
function calcCountdown(dl) {
  const now = new Date(), [h,m] = dl.split(":").map(Number);
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  const diff = Math.max(0, target - now);
  return `${String(Math.floor(diff/60000)).padStart(2,"0")}:${String(Math.floor((diff%60000)/1000)).padStart(2,"0")}`;
}
function getWeekDates() {
  const today = new Date(), dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate() - (dow===0?6:dow-1));
  return Array.from({length:5}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; });
}
function snapToArr(val) { return Object.values(val||{}).sort((a,b)=>a.joinedAt-b.joinedAt); }
function mergeRests(custObj) { const m = {}; for (const cat of CATEGORIES) { const c = Object.values(custObj?.[cat]||{}); m[cat] = [...new Set([...DEFAULT_RESTS[cat],...c])]; } return m; }

async function getOrDrawNumber(dateStr) {
  let drawn = null;
  await fRef(`lunch/drawn/${dateStr}`).transaction(current => { if (current !== null) { drawn = current; return; } drawn = Math.floor(Math.random() * 99) + 1; return drawn; });
  if (drawn === null) drawn = await fGet(`lunch/drawn/${dateStr}`);
  return drawn;
}

// ✨ 全新的判斷邏輯（同分時以開獎號碼取餘數決定）
function determineResult(pts, drawnNumber) {
  if (!pts || pts.length === 0) return null;
  const exact = pts.find(p => p.number === drawnNumber);
  if (exact) return { winner: exact, soloWin: true, sorted: pts };
  
  // 先依距離排序
  const sorted = [...pts].sort((a,b) => Math.abs(a.number-drawnNumber) - Math.abs(b.number-drawnNumber));
  
  // 找出最小距離
  const minDiff = Math.abs(sorted[0].number - drawnNumber);
  
  // 篩選出所有距離一樣近的人
  const tiedWinners = sorted.filter(p => Math.abs(p.number - drawnNumber) === minDiff);
  
  // 利用開獎號碼取餘數，決定最終贏家
  const winnerIndex = drawnNumber % tiedWinners.length;
  const finalWinner = tiedWinners[winnerIndex];
  
  // 確保最終贏家排在第一位
  const finalSorted = [finalWinner, ...sorted.filter(p => p.id !== finalWinner.id)];
  return { winner: finalWinner, soloWin: false, sorted: finalSorted };
}

function StatsPanel({weekly}) {
  const chartRef = useRef(null); const chartInstanceRef = useRef(null);
  const allRecords = Object.entries(weekly); const restCounts = {};
  allRecords.forEach(([, rec]) => { if (rec?.rest) restCounts[rec.rest] = (restCounts[rec.rest] || 0) + 1; });
  const sortedRests = Object.entries(restCounts).sort((a,b) => b[1]-a[1]);
  const soloMap = {};
  allRecords.forEach(([date, rec]) => { if (rec?.soloWin && rec.winner) { if (!soloMap[rec.winner]) soloMap[rec.winner] = []; soloMap[rec.winner].push(date); } });
  const sortedSolo = Object.entries(soloMap).sort((a,b) => b[1].length - a[1].length);
  const BAR_COLORS = ["#0071E3","#34C759","#FF9500","#5AC8FA","#FF2D55","#AF52DE","#FFCC00","#FF3B30"];
  
  useEffect(() => {
    if (!chartRef.current || sortedRests.length === 0) return;
    if (chartInstanceRef.current) { chartInstanceRef.current.destroy(); }
    chartInstanceRef.current = new Chart(chartRef.current, {
      type: "bar",
      data: { labels: sortedRests.map(([r]) => r), datasets: [{ data: sortedRests.map(([,c]) => c), backgroundColor: sortedRests.map((_,i) => BAR_COLORS[i%BAR_COLORS.length]), borderWidth: 0, borderRadius: 4 }] },
      options: { indexAxis: "y", responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} 次` } } }, scales: { x: { beginAtZero: true, ticks: { stepSize:1, precision:0, color:"#86868B" }, grid: { color:"rgba(0,0,0,0.05)" } }, y: { ticks: { font:{size:13,weight:"500",family:"Inter"}, color:"#515154" }, grid: { display:false } } } }
    });
    return () => { if (chartInstanceRef.current) chartInstanceRef.current.destroy(); };
  }, [JSON.stringify(sortedRests)]);
  
  return (
    <div style={{marginTop:"24px",display:"flex",flexDirection:"column",gap:"16px"}}>
      <div className="card"><p className="section-label" style={{marginBottom:"20px"}}>店家中選次數</p>{sortedRests.length === 0 ? <p style={{textAlign:"center",color:"var(--t3)",fontSize:"14px"}}>尚無紀錄</p> : <div style={{height:`${Math.max(160,sortedRests.length*48)}px`,position:"relative"}}><canvas ref={chartRef} /></div>}</div>
      <div className="card"><p className="section-label" style={{marginBottom:"20px"}}>獨贏紀錄</p>{sortedSolo.length === 0 ? <p style={{textAlign:"center",color:"var(--t3)",fontSize:"14px"}}>尚無獨贏紀錄</p> : sortedSolo.map(([name, dates]) => (<div key={name} style={{display:"flex",alignItems:"flex-start",gap:"16px",marginBottom:"16px"}}><div style={{minWidth:"80px",flexShrink:0}}><div style={{fontSize:"16px",fontWeight:"600",color:"var(--t1)"}}>{name}</div><div style={{fontSize:"13px",fontWeight:"600",color:"var(--amber)",marginTop:"2px"}}>{dates.length} 次</div></div><div style={{flex:1,display:"flex",flexWrap:"wrap",gap:"6px",paddingTop:"2px"}}>{[...dates].sort().map(d => { const [,mm,dd] = d.split("-"); return <span key={d} className="badge badge-gold">{parseInt(mm)}/{parseInt(dd)}</span>; })}</div></div>))}</div>
    </div>
  );
}

function WeeklyRecord({weekly, setWeekly, showStats, setShowStats}) {
  const weekDates = getWeekDates(), today = todayStr();
  async function clearWeekly() { const pw = window.prompt("管理員密碼"); if (pw === null) return; if (pw !== ADMIN_PASSWORD) { alert("密碼錯誤"); return; } await fSet("lunch/weekly", null); setWeekly({}); }
  return (
    <div className="card">
      <div style={{display:"flex",alignItems:"center",marginBottom:"16px"}}><p className="section-label" style={{flex:1,marginBottom:0}}>本週紀錄</p><button onClick={()=>setShowStats(!showStats)} className="ghost btn-sm" style={{marginRight:"8px"}}>{showStats?"收起":"統計"}</button><button onClick={clearWeekly} className="btn-danger btn-sm">清除</button></div>
      {weekDates.map((date,i) => {
        const rec = weekly[date], isToday = date===today;
        return (
          <div key={date} className={`week-row${isToday?" today":""}`}><div className={`week-day${isToday?" today":""}`}>{WDAYS[i]}</div>
            {rec ? (<div style={{flex:1,marginLeft:"12px",minWidth:0}}><div style={{fontSize:"14px",fontWeight:"600",color:"var(--t1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.4}}>{rec.soloWin?rec.winner:rec.rest}</div><div style={{fontSize:"12px",color:"var(--t2)",marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:"6px"}}>{rec.soloWin?rec.rest:rec.winner}{rec.soloWin && <span className="badge badge-gold">獨贏</span>}</div></div>) : <div style={{flex:1,marginLeft:"12px",fontSize:"14px",color:"var(--t3)"}}>—</div>}
            {rec?.drawnNumber ? <div style={{fontSize:"16px",fontWeight:"700",color:"var(--t1)",fontVariantNumeric:"tabular-nums",marginLeft:"12px",minWidth:"40px",textAlign:"right",flexShrink:0}}>#{rec.drawnNumber}</div> : <div style={{minWidth:"40px"}} />}
          </div>
        );
      })}
      {showStats && <StatsPanel weekly={weekly} />}
    </div>
  );
}

/* ── App 主程式 ── */
function App() {
  const [phase, setPhase] = useState("loading");
  const [sess, setSess] = useState(null);
  const [pts, setPts] = useState([]);
  const [rests, setRests] = useState(mergeRests(null));
  const [weekly, setWeekly] = useState({});
  const [form, setForm] = useState({name:"",category:"",rest:"",cust:"",number:"",deadline:"11:50"});
  const [result, setResult] = useState(null);
  const [cd, setCd] = useState("--:--");
  const [numWarn, setNumWarn] = useState("");
  const [resetModal, setResetModal] = useState(false);
  const [resetPw, setResetPw] = useState("");
  const [resetErr, setResetErr] = useState("");
  const [showStats, setShowStats] = useState(false);
  const sessRef = useRef(null); const savedRef = useRef(false); const timerRef = useRef(null);

  useEffect(() => { sessRef.current = sess; }, [sess]);

  useEffect(() => {
    Promise.all([fGet("lunch/session"),fGet("lunch/restaurants"),fGet("lunch/weekly"),fGet("lunch/participants")]).then(async ([s,custR,w,ptsObj]) => {
      setRests(mergeRests(custR)); setWeekly(w||{});
      const today = todayStr();
      if (!s || s.date !== today) { setPhase("setup"); return; }
      const p = snapToArr(ptsObj); setSess(s); setPts(p);
      if (isDeadlinePassed(s.deadline)) {
        const drawn = await getOrDrawNumber(today); const res = determineResult(p, drawn);
        setResult(res ? {...res, drawnNumber: drawn} : {drawnNumber: drawn, winner: null, soloWin: false, sorted: p});
        setPhase("results");
      } else { setPhase("join"); }
    }).catch(() => setPhase("setup"));
  }, []);

  useEffect(() => {
    if (phase!=="join" && phase!=="joined") return;
    const pRef = fRef("lunch/participants");
    const handler = snap => setPts(snapToArr(snap.val()));
    pRef.on("value", handler); return () => pRef.off("value", handler);
  }, [phase]);

  useEffect(() => {
    if (!sess || (phase!=="join" && phase!=="joined")) return;
    setCd(calcCountdown(sess.deadline));
    timerRef.current = setInterval(async () => {
      const dl = sessRef.current?.deadline; if (!dl) return;
      setCd(calcCountdown(dl));
      if (isDeadlinePassed(dl)) {
        clearInterval(timerRef.current);
        const ptsObj = await fGet("lunch/participants"), finalPts = snapToArr(ptsObj), drawn = await getOrDrawNumber(todayStr()), res = determineResult(finalPts, drawn);
        setResult(res ? {...res,drawnNumber:drawn} : {drawnNumber:drawn,winner:null,soloWin:false,sorted:finalPts});
        setPts(finalPts); setPhase("results");
      }
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, sess]);

  useEffect(() => {
    if (phase!=="results"||!result?.winner||savedRef.current) return;
    savedRef.current = true; const today = todayStr();
    fGet("lunch/weekly").then(async w => {
      if ((w||{})[today]) { setWeekly(w); return; }
      const nw = {...(w||{}), [today]: {winner:result.winner.name, rest:result.winner.rest, soloWin:result.soloWin, drawnNumber:result.drawnNumber}};
      await fSet("lunch/weekly", nw); setWeekly(nw);
    });
  }, [phase, result]);

  async function doSetup() {
    if (!/^\d{2}:\d{2}$/.test(form.deadline)) return alert("請輸入正確時間格式 HH:MM");
    if (isDeadlinePassed(form.deadline)) return alert("截止時間已過！請設定未來的時間");
    const s = {deadline:form.deadline, date:todayStr()};
    await fSet("lunch/session", s); await fSet("lunch/participants", null);
    setSess(s); setPts([]); setResult(null); setPhase("join");
  }

  async function doJoin() {
    const name = form.name.trim();
    if (!name) return alert("請輸入姓名");
    if (!form.category) return alert("請選擇餐廳類型");
    const rest = form.rest==="cust" ? form.cust.trim() : form.rest;
    if (!rest) return alert("請選擇或輸入店家");
    const num = parseInt(form.number);
    if (!num || num < 1 || num > 99) return alert("請輸入 1 到 99 之間的整數");
    const s = await fGet("lunch/session");
    if (!s || isDeadlinePassed(s.deadline)) return alert("已超過截止時間！");
    const existing = snapToArr(await fGet("lunch/participants")), myEntry = existing.find(p=>p.name===name);
    if (existing.some(p=>p.id!==(myEntry?.id) && p.number===num)) { setNumWarn(`數字 ${num} 已被選走，請換一個`); return; }
    if (myEntry) { await fRef(`lunch/participants/${myEntry.id}`).update({category:form.category, rest, number:num}); } 
    else { const newRef = fRef("lunch/participants").push(); await newRef.set({id:newRef.key, name, category:form.category, rest, number:num, joinedAt:Date.now()}); }
    if (form.rest==="cust" && rest && !DEFAULT_RESTS[form.category]?.includes(rest)) { await fRef(`lunch/restaurants/${form.category}`).push(rest); setRests(r => ({...r, [form.category]: [...new Set([...(r[form.category]||[]), rest])]})); }
    setPhase("joined");
  }

  async function doReset() {
    const today = todayStr();
    await fSet("lunch/session", null); await fSet("lunch/participants", null); await fSet(`lunch/drawn/${today}`, null); await fRef(`lunch/weekly/${today}`).remove();
    savedRef.current = false; setSess(null); setPts([]); setResult(null); setCd("--:--");
    setWeekly(w => { const n={...w}; delete n[today]; return n; });
    setForm({name:"",category:"",rest:"",cust:"",number:"",deadline:"11:50"}); setPhase("setup");
  }

  async function confirmReset() { if (resetPw !== ADMIN_PASSWORD) { setResetErr("密碼錯誤"); return; } setResetModal(false); await doReset(); }

  const takenNums = pts.map(p=>({num:p.number,name:p.name})).filter(x=>x.num);

  if (phase==="loading") return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)"}}><div className="status-dot" style={{width:"12px",height:"12px"}}></div></div>;

  if (phase==="setup") return (
    <div>
      <SiteHeader />
      <div className="page fade-up">
        <PasswordModal show={resetModal} pw={resetPw} setPw={setResetPw} err={resetErr} onConfirm={confirmReset} onCancel={()=>setResetModal(false)} />
        <div style={{maxWidth:"440px",margin:"0 auto",paddingTop:"40px"}}>
          <div style={{marginBottom:"40px",textAlign:"center"}}><h1 style={{marginBottom:"12px"}}>今天的午餐</h1><p>設定截止時間，到時系統將自動開獎</p></div>
          <div className="card"><label>開獎時間</label><input type="time" value={form.deadline} onChange={e=>setForm({...form,deadline:e.target.value})} /><button onClick={doSetup} style={{marginTop:"8px"}}>建立遊戲</button></div>
          <div style={{marginTop:"40px"}}><WeeklyRecord weekly={weekly} setWeekly={setWeekly} showStats={showStats} setShowStats={setShowStats} /></div>
        </div>
      </div>
      <Footer />
    </div>
  );

  if (phase==="join") return (
    <div>
      <SiteHeader title="購買彩券" sub="截止前選好店、押好號" live={true} cd={cd} />
      <div className="page fade-up">
        <PasswordModal show={resetModal} pw={resetPw} setPw={setResetPw} err={resetErr} onConfirm={confirmReset} onCancel={()=>setResetModal(false)} />
        <StatCards deadline={sess?.deadline} ptsCount={pts.length} cd={cd} />
        <div className="grid-3">
          <div className="col"><WeeklyRecord weekly={weekly} setWeekly={setWeekly} showStats={showStats} setShowStats={setShowStats} /></div>
          <div className="col">
            <div className="card">
              <div className="form-title"><h2>加入遊戲</h2><p>選好店、押好幸運號碼</p></div>
              <label>你的名字</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="輸入姓名" />
              <label>餐廳類型</label>
              <select value={form.category} onChange={e=>setForm({...form,category:e.target.value,rest:"",cust:""})}><option value="">請選擇類型</option>{CATEGORIES.map(c=><option key={c} value={c}>{CAT_EMOJI[c]} {c}</option>)}</select>
              {form.category && (<><label>想吃的店家</label><select value={form.rest} onChange={e=>setForm({...form,rest:e.target.value,cust:""})}><option value="">請選擇店家</option>{(rests[form.category]||[]).map(r=><option key={r} value={r}>{r}</option>)}<option value="cust">其他（自行輸入）</option></select>{form.rest==="cust" && <input value={form.cust} onChange={e=>setForm({...form,cust:e.target.value})} placeholder="輸入店家名稱" />}</>)}
              <label>選一個號碼（1 ~ 99）</label><div className="num-input-wrap"><span className="num-prefix">#</span><input type="text" inputMode="numeric" maxLength={2} value={form.number} onChange={e=>{const v=e.target.value.replace(/\D/g,"").slice(0,2);setForm({...form,number:v});setNumWarn("");}} placeholder="1 ~ 99" style={{marginBottom:"8px"}} /></div>
              {numWarn && <p style={{color:"var(--red)",fontSize:"13px",marginTop:0,marginBottom:"12px",fontWeight:"500"}}>{numWarn}</p>}
              {takenNums.length>0 && (<div style={{marginBottom:"20px",marginTop:"8px"}}><p style={{fontSize:"12px",color:"var(--t3)",marginTop:0,marginBottom:"8px",fontWeight:"500"}}>已被選走</p><div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{takenNums.map(({num,name})=>(<span key={num} className="num-chip taken">{num} <span style={{opacity:0.7,fontWeight:"400"}}>({name})</span></span>))}</div></div>)}
              <div className="divider" /><button onClick={doJoin}>確認加入</button><button className="ghost" onClick={()=>{setResetModal(true);setResetPw("");setResetErr("");}}>重新設定時間</button>
            </div>
          </div>
          <div className="col"><PtList list={pts} /></div>
        </div>
      </div>
      <Footer />
    </div>
  );

  if (phase==="joined") {
    function editMyEntry() { const myEntry = pts.find(p=>p.name===form.name); if (myEntry) setForm(f=>({...f, category:myEntry.category, rest:myEntry.rest, number:String(myEntry.number), cust:""})); setPhase("join"); }
    return (
      <div>
        <SiteHeader title="等待開獎中" sub="時間到準時揭曉" live={true} cd={cd} />
        <div className="page fade-up">
          <PasswordModal show={resetModal} pw={resetPw} setPw={setResetPw} err={resetErr} onConfirm={confirmReset} onCancel={()=>setResetModal(false)} />
          <StatCards deadline={sess?.deadline} ptsCount={pts.length} cd={cd} />
          <div className="grid-3">
            <div className="col"><WeeklyRecord weekly={weekly} setWeekly={setWeekly} showStats={showStats} setShowStats={setShowStats} /></div>
            <div className="col"><div className="card"><h2 style={{fontSize:"18px",marginBottom:"24px"}}>你的選擇已送出</h2><button className="ghost" onClick={editMyEntry} style={{marginBottom:"16px"}}>修改我的選擇</button><div className="divider" /><button className="ghost btn-danger" style={{width:"100%"}} onClick={()=>{setResetModal(true);setResetPw("");setResetErr("");}}>管理員：清除今日遊戲</button></div></div>
            <div className="col"><PtList list={pts} /></div>
          </div>
        </div>
        <Footer />
      </div>
    );
  }

  if (phase==="results") {
    if (!result?.winner || pts.length < 2) return (
      <div>
        <SiteHeader title="開獎結果" />
        <div className="page fade-up">
          <PasswordModal show={resetModal} pw={resetPw} setPw={setResetPw} err={resetErr} onConfirm={confirmReset} onCancel={()=>setResetModal(false)} />
          <div className="layout-2"><div className="layout-side"><WeeklyRecord weekly={weekly} setWeekly={setWeekly} showStats={showStats} setShowStats={setShowStats} /></div><div className="layout-main"><h1 style={{marginBottom:"12px"}}>時間到！</h1><p style={{marginBottom:"32px"}}>今天只有 {pts.length} 人參加，無法開獎</p><button className="ghost" onClick={()=>{setResetModal(true);setResetPw("");setResetErr("");}} style={{width:"auto",padding:"12px 24px"}}>重新開始</button></div></div>
        </div>
        <Footer />
      </div>
    );
    const {winner, soloWin, drawnNumber, sorted} = result, allSorted = sorted || pts, maxTotal = (pts.length-1)*50;
    return (
      <div>
        <SiteHeader title={soloWin?"完全命中！":"開獎結果"} />
        <div className="page fade-up">
          <PasswordModal show={resetModal} pw={resetPw} setPw={setResetPw} err={resetErr} onConfirm={confirmReset} onCancel={()=>setResetModal(false)} />
          <div className="layout-2">
            <div className="layout-side"><WeeklyRecord weekly={weekly} setWeekly={setWeekly} showStats={showStats} setShowStats={setShowStats} /></div>
            <div className="layout-main">
              <div style={{marginBottom:"40px"}}><p className="section-label" style={{marginBottom:"12px"}}>今天的幸運號碼</p><div className="result-number">{drawnNumber}</div></div>
              {soloWin ? (
                <div style={{background:"#FFF7ED",border:"1px solid #FFEDD5",borderRadius:"var(--r2)",padding:"24px",marginBottom:"24px",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:"#F97316"}} /><span className="badge badge-gold" style={{marginBottom:"16px",display:"inline-flex"}}>完全命中 · 獨贏</span><div style={{fontSize:"32px",fontWeight:"700",color:"#9A3412",marginBottom:"8px"}}>{winner.name}</div><div style={{fontSize:"15px",fontWeight:"500",color:"#C2410C",marginBottom:"20px"}}>{winner.rest}</div><div style={{height:"1px",background:"#FED7AA",margin:"0 0 16px"}} /><p style={{marginTop:0,fontSize:"14px",color:"#9A3412"}}>請客方案 · 每人最多 <strong style={{color:"#7C2D12"}}>50 元</strong> · 共 {pts.length-1} 人，上限 {maxTotal} 元</p></div>
              ) : (
                <div style={{background:"#F0FDF4",border:"1px solid #DCFCE7",borderRadius:"var(--r2)",padding:"24px",marginBottom:"24px",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:"#22C55E"}} /><span className="badge badge-green" style={{marginBottom:"16px",display:"inline-flex"}}>最接近 · 各自付帳</span><div style={{fontSize:"28px",fontWeight:"700",color:"#166534",marginBottom:"8px"}}>{winner.rest}</div><div style={{fontSize:"15px",color:"#15803D"}}>由 <strong style={{color:"#14532D",fontWeight:"600"}}>{winner.name}</strong> 推薦</div></div>
              )}
              <div className="card" style={{marginBottom:"24px"}}><p className="section-label" style={{marginBottom:"16px"}}>本次排名</p>
                {allSorted.map((p,i) => {
                  const dist = Math.abs(p.number - drawnNumber), isWinner = p.id === winner.id, ramp = RAMPS[pts.findIndex(x=>x.id===p.id) % RAMPS.length];
                  return (
                    <div key={p.id} style={{display:"flex",alignItems:"center",padding:"12px 16px",background:isWinner?ramp.bg:"transparent",border:isWinner?`1px solid ${ramp.bd}`:"1px solid transparent",borderRadius:"var(--r)",marginBottom:"6px"}}><span style={{fontSize:"13px",fontWeight:"500",color:"var(--t3)",width:"24px",flexShrink:0}}>{i+1}</span><span style={{flex:1,fontWeight:isWinner?"600":"500",fontSize:"15px",color:isWinner?ramp.tx:"var(--t1)"}}>{p.name}</span><span style={{fontSize:"16px",fontWeight:"600",color:isWinner?ramp.tx:"var(--t2)",marginRight:"16px"}}>#{p.number}</span><span style={{fontSize:"13px",fontWeight:"500",color:isWinner?ramp.tx:"var(--t3)",minWidth:"64px",textAlign:"right"}}>{dist===0?"命中":`差 ${dist}`}</span></div>
                  );
                })}
              </div>
              <button className="ghost" onClick={()=>{setResetModal(true);setResetPw("");setResetErr("");}} style={{width:"auto",padding:"12px 24px"}}>重新開始遊戲</button>
            </div>
          </div>
        </div>
        <Footer />
      </div>
    );
  }
  return null;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
