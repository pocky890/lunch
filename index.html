  const maxCount = Math.max(0, ...Object.values(numCounts));
  const hasData = Object.keys(numCounts).length > 0;
  const base = isDark ? "96,165,250" : "0,113,227";
  return (
    <div className="card">
      <div style={{display:"flex",alignItems:"center",marginBottom:"14px"}}>
        <p className="section-label" style={{marginBottom:0,flex:1}}>開獎號碼分佈</p>
        {hasData && <span style={{fontSize:"10px",color:"var(--t3)"}}>{isDark ? "淺色" : "深色"} = 出現較多次</span>}
      </div>
      {!hasData
        ? <p style={{textAlign:"center",color:"var(--t3)",fontSize:"14px"}}>尚無紀錄</p>
        : <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:"3px"}}>
            {Array.from({length:numMax},(_,i)=>i+1).map(n => {
              const count = numCounts[n] || 0;
              const intensity = count === 0 ? 0 : maxCount <= 1 ? 0.55 : 0.3 + (count/maxCount)*0.7;
              return (
                <div key={n} title={count > 0 ? `#${n}：${count} 次` : `#${n}`}
                  style={{
                    aspectRatio:"1",borderRadius:"3px",userSelect:"none",
                    background: count === 0
                      ? (isDark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.07)")
                      : `rgba(${base},${intensity.toFixed(2)})`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:"11px",fontWeight:"600",
                    color: count>0?(isDark?"#BFDBFE":"#003580"):"var(--t3)"
                  }}>
                  {n}
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

function StatsPanel({weekly, isDark, userTitles = {}, boundName = "", onTitleChange, mySpecialAchievements = {}, titleShopConfig = {}}) {
  const chartRef = useRef(null); const chartInstanceRef = useRef(null);
  const [participationCounts, setParticipationCounts] = useState({});
  useEffect(() => { fGet("participationCount").then(d => setParticipationCounts(d || {})); }, []);

  const allRecords = Object.entries(weekly);

  const restCounts = {};
  allRecords.forEach(([, rec]) => { if (rec?.rest) restCounts[rec.rest] = (restCounts[rec.rest] || 0) + 1; });
  const sortedRests = Object.entries(restCounts).sort((a,b) => b[1]-a[1]).slice(0, 10);

  const soloMap = {};
  allRecords.forEach(([date, rec]) => { if (rec?.soloWin) { (rec.winners || (rec.winner ? [rec.winner] : [])).forEach(name => { if (!soloMap[name]) soloMap[name] = []; soloMap[name].push(date); }); } });
  const sortedSolo = Object.entries(soloMap).sort((a,b) => b[1].length - a[1].length);

  const winMap = {};
  allRecords.forEach(([, rec]) => { if (rec?.winner) { (rec.winners || [rec.winner]).forEach(name => { if (!winMap[name]) winMap[name] = { wins: 0, soloWins: 0 }; winMap[name].wins++; if (rec.soloWin) winMap[name].soloWins++; }); } });
  const sortedPersonal = Object.entries(winMap).sort((a,b) => b[1].wins - a[1].wins);

  const base = isDark ? "96,165,250" : "0,113,227";
  const tickColor = isDark ? "rgba(235,235,245,0.6)" : "#515154";
  const gridColor = isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)";
  const gradientColors = (arr) => arr.map((_,i) => `rgba(${base},${arr.length===1?1:(1-(i/(arr.length-1))*0.75).toFixed(2)})`);

  useEffect(() => {
    if (!chartRef.current || sortedRests.length === 0) return;
    if (chartInstanceRef.current) { chartInstanceRef.current.destroy(); }
    chartInstanceRef.current = new Chart(chartRef.current, {
      type: "bar",
      data: { labels: sortedRests.map(([r]) => r), datasets: [{ data: sortedRests.map(([,c]) => c), backgroundColor: gradientColors(sortedRests), borderWidth: 0, borderRadius: 4, maxBarThickness: 28 }] },
      options: { indexAxis: "y", responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} 次` } } }, scales: { x: { beginAtZero: true, ticks: { stepSize:1, precision:0, color:tickColor }, grid: { color:gridColor } }, y: { ticks: { font:{size:13,weight:"500",family:"Inter"}, color:tickColor }, grid: { display:false } } } }
    });
    return () => { if (chartInstanceRef.current) chartInstanceRef.current.destroy(); };
  }, [JSON.stringify(sortedRests), isDark]);
  
  return (
    <div style={{marginTop:"24px",display:"flex",flexDirection:"column",gap:"16px"}}>
      <div className="card"><p className="section-label" style={{marginBottom:"20px"}}>Top 10 店家中選次數 (持續統計)</p>{sortedRests.length === 0 ? <p style={{textAlign:"center",color:"var(--t3)",fontSize:"14px"}}>尚無紀錄</p> : <div style={{height:`${Math.max(160,sortedRests.length*48)}px`,position:"relative"}}><canvas ref={chartRef} /></div>}</div>
      <div className="card"><p className="section-label" style={{marginBottom:"20px"}}>個人戰績 (持續統計)</p>{sortedPersonal.length === 0 ? <p style={{textAlign:"center",color:"var(--t3)",fontSize:"14px"}}>尚無紀錄</p> : sortedPersonal.map(([name, stat], i) => {
        const sKey = sanitizeKey(name);
        const isMe = name === boundName;
        const unlocked = computeAchievements(name, weekly, participationCounts[sKey] || 0, isMe ? mySpecialAchievements : {});
        const chosenKey = userTitles[sKey];
        return (
          <div key={name} style={{padding:"10px 12px",borderRadius:"var(--r)",border:"1px solid var(--b1)",background:"var(--s3)",marginBottom:"6px"}}>
            <div style={{display:"flex",alignItems:"center"}}>
              <span style={{fontSize:"12px",color:"var(--t3)",width:"20px",flexShrink:0,fontWeight:"600"}}>{i+1}</span>
              <span style={{flex:1,fontSize:"14px",fontWeight:"600",color:"var(--t1)",marginLeft:"10px",display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                {name}
                {chosenKey && (() => { const a = getTitleDisplay(chosenKey, titleShopConfig); return a ? <span className="badge badge-title">{a.emoji} {a.name}</span> : null; })()}
              </span>
              <span style={{fontSize:"13px",fontWeight:"700",color:"var(--amber)",flexShrink:0}}>{stat.wins} 勝</span>
              {stat.soloWins > 0 && <span className="badge badge-gold" style={{marginLeft:"8px",fontSize:"10px",flexShrink:0}}>🎯 獨贏 {stat.soloWins}</span>}
            </div>
            {isMe && unlocked.filter(k => k !== chosenKey).length > 0 && (
              <div style={{marginTop:"8px",marginLeft:"30px",display:"flex",flexWrap:"wrap",gap:"4px"}}>
                {unlocked.filter(k => k !== chosenKey).map(key => {
                  const a = ACHIEVEMENTS.find(x => x.key === key);
                  return <span key={key} title={a.desc} className="badge badge-title">{a.emoji} {a.name}</span>;
                })}
              </div>
            )}
          </div>
        );
      })}</div>
      <div className="card"><p className="section-label" style={{marginBottom:"20px"}}>獨贏紀錄 (持續統計)</p>{sortedSolo.length === 0 ? <p style={{textAlign:"center",color:"var(--t3)",fontSize:"14px"}}>尚無獨贏紀錄</p> : sortedSolo.map(([name, dates]) => (<div key={name} style={{display:"flex",alignItems:"flex-start",gap:"16px",marginBottom:"16px"}}><div style={{minWidth:"80px",flexShrink:0}}><div style={{fontSize:"16px",fontWeight:"600",color:"var(--t1)"}}>{name}</div><div style={{fontSize:"13px",fontWeight:"600",color:"var(--amber)",marginTop:"2px"}}>{dates.length} 次</div></div><div style={{flex:1,display:"flex",flexWrap:"wrap",gap:"6px",paddingTop:"2px"}}>{[...dates].sort().map(d => { const [,mm,dd] = d.split("-"); return <span key={d} className="badge badge-gold">{parseInt(mm)}/{parseInt(dd)}</span>; })}</div></div>))}</div>
    </div>
  );
}

function HistoryModal({ weekly, onClose, userTitles = {}, titleShopConfig = {} }) {
  const [weekIdx, setWeekIdx] = React.useState(0);
  function getMondayStr(dateStr) {
    const d = new Date(dateStr+"T00:00:00"), dow = d.getDay();
    const mon = new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
    return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,"0")}-${String(mon.getDate()).padStart(2,"0")}`;
  }
  const weekGroups = {};
  Object.keys(weekly).sort().reverse().forEach(date => { const m=getMondayStr(date); if(!weekGroups[m])weekGroups[m]=[]; weekGroups[m].push(date); });
  const sortedWeeks = Object.keys(weekGroups).sort().reverse(); // 0 = 最新週
  const total = sortedWeeks.length;

  const monStr = sortedWeeks[weekIdx] || null;
  const weekData = monStr ? (() => {
    const mon = new Date(monStr+"T00:00:00");
    const fri = new Date(mon); fri.setDate(mon.getDate()+4);
    const days = Array.from({length:5},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; });
    const label = `${mon.getFullYear()}/${mon.getMonth()+1}/${mon.getDate()} – ${fri.getMonth()+1}/${fri.getDate()}`;
    return { days, label, count: days.filter(d=>weekly[d]).length };
  })() : null;

  const navBtn = (label, disabled, onClick) => (
    <button onClick={onClick} disabled={disabled} className="ghost btn-sm"
      style={{marginBottom:0, padding:"6px 14px", opacity:disabled?0.3:1, cursor:disabled?"default":"pointer"}}>
      {label}
    </button>
  );

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="card fade-up" style={{width:"480px",maxWidth:"95vw",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:"20px",flexShrink:0}}>
          <h2 style={{flex:1,fontSize:"18px"}}>📅 歷史開獎紀錄</h2>
          <button className="ghost btn-sm" onClick={onClose} style={{marginBottom:0}}>✕ 關閉</button>
        </div>

        {total===0 ? (
          <p style={{textAlign:"center",color:"var(--t2)",padding:"32px 0"}}>尚無歷史紀錄</p>
        ) : (<>
          {/* 週導航 */}
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"20px",flexShrink:0}}>
            {navBtn("← 上一週", weekIdx >= total-1, ()=>setWeekIdx(i=>i+1))}
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:"14px",fontWeight:"600",color:"var(--t1)"}}>{weekData.label}</div>
              <div style={{fontSize:"12px",color:"var(--t2)",marginTop:"3px"}}>{weekIdx===0?"本週":`${weekIdx+1} 週前`} · {weekData.count}/5 天有紀錄</div>
            </div>
            {navBtn("下一週 →", weekIdx===0, ()=>setWeekIdx(i=>i-1))}
          </div>

          {/* 當週五天 */}
          <div>
            {weekData.days.map((date,i)=>{
              const rec=weekly[date]; const [,m,d]=date.split("-");
              return (
                <div key={date} style={{display:"flex",alignItems:"center",padding:"11px 12px",borderRadius:"10px",marginBottom:"4px",background:rec?"var(--s3)":"transparent",border:`1px solid ${rec?"var(--b1)":"transparent"}`}}>
                  <div style={{width:"32px",flexShrink:0,fontSize:"13px",fontWeight:"600",color:"var(--t2)"}}>{WDAYS[i]}</div>
                  <div style={{width:"42px",flexShrink:0,fontSize:"12px",color:"var(--t3)"}}>{parseInt(m)}/{parseInt(d)}</div>
                  {rec?(<>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:"14px",fontWeight:"600",color:"var(--t1)",lineHeight:1.4,display:"flex",alignItems:"center",gap:"6px",minWidth:0}}>
                        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.soloWin?(rec.winners||[rec.winner]).join(" / "):rec.rest}</span>
                        {rec.soloWin&&<span className="badge badge-gold" style={{fontSize:"10px",padding:"1px 6px",flexShrink:0}}>{rec.winners?.length>1?"共贏":"獨贏"}</span>}
                        {!rec.soloWin&&rec.streak>=3&&<span className="badge badge-gold" style={{fontSize:"10px",padding:"1px 6px",flexShrink:0}}>🔥{rec.streak}連</span>}
                      </div>
                      <div style={{fontSize:"12px",color:"var(--t2)",marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.soloWin?rec.rest:rec.winner}</div>
                    </div>
                    <div style={{fontSize:"16px",fontWeight:"700",color:"var(--t1)",marginLeft:"12px",flexShrink:0}}>#{rec.drawnNumber}</div>
                  </>):(<div style={{flex:1,fontSize:"13px",color:"var(--t3)"}}>—</div>)}
                </div>
              );
            })}
          </div>

          <div style={{textAlign:"center",marginTop:"16px",fontSize:"12px",color:"var(--t3)"}}>
            {weekIdx+1} / {total} 週
          </div>
        </>)}
      </div>
    </div>
  );
}

function WeeklyRecord({weekly, setWeekly, showStats, setShowStats, isDark, onHistory, isAdmin, userTitles, boundName, onTitleChange, mySpecialAchievements = {}, titleShopConfig = {}}) {
  const [showClearModal, setShowClearModal] = useState(false);
  const [targetDate, setTargetDate] = useState(null);

  const weekDates = getWeekDates(), today = todayStr();

  function handleDeleteClick(date) {
    setTargetDate(date);
    setShowClearModal(true);
  }

  async function confirmDelete() {
    setShowClearModal(false);
    if (targetDate) {
      await fRef(`weekly/${targetDate}`).remove();
      setWeekly(prev => { const n={...prev}; delete n[targetDate]; return n; });
      setTargetDate(null);
    }
  }

  return (
    <div className="card">
      <ConfirmModal show={showClearModal} message={`確定要刪除 ${targetDate} 的紀錄？`} onConfirm={confirmDelete} onCancel={() => setShowClearModal(false)} />
      
      <div style={{display:"flex",alignItems:"center",marginBottom:"16px"}}>
        <p className="section-label" style={{flex:1,marginBottom:0}}>本週開獎結果</p>
        <button onClick={onHistory} className="ghost btn-sm" style={{marginBottom:0,marginRight:"8px"}}>📅 歷史</button>
        <button onClick={()=>setShowStats(!showStats)} className="ghost btn-sm" style={{marginRight: 0}}>{showStats?"收起":"排行榜"}</button>
      </div>
      
      {weekDates.map((date,i) => {
        const rec = weekly[date], isToday = date===today;
        return (
          <div key={date} className={`week-row${isToday?" today":""}`}>
            <div className={`week-day${isToday?" today":""}`}>{WDAYS[i]}</div>
            {rec ? (
              <>
                <div style={{flex:1,marginLeft:"12px",minWidth:0}}>
                  <div style={{fontSize:"14px",fontWeight:"600",color:"var(--t1)",lineHeight:1.4,display:"flex",alignItems:"center",gap:"6px",minWidth:0}}>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.soloWin?(rec.winners||[rec.winner]).join(" / "):rec.rest}</span>
                    {rec.soloWin && <span className="badge badge-gold" style={{flexShrink:0}}>{rec.winners?.length>1?"共贏":"獨贏"}</span>}
                    {!rec.soloWin && rec.streak >= 3 && <span className="badge badge-gold" style={{flexShrink:0}}>🔥{rec.streak}連</span>}
                  </div>
                  <div style={{fontSize:"12px",color:"var(--t2)",marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.soloWin?rec.rest:rec.winner}</div>
                </div>
                <div style={{fontSize:"16px",fontWeight:"700",color:"var(--t1)",fontVariantNumeric:"tabular-nums",marginLeft:"12px",minWidth:"40px",textAlign:"right",flexShrink:0}}>#{rec.drawnNumber}</div>
                
                {isAdmin && (
                  <button
                    className="ghost btn-danger"
                    style={{width:"28px",height:"28px",padding:0,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"8px",marginLeft:"12px",marginBottom:0,flexShrink:0,opacity:0.6}}
                    onClick={() => handleDeleteClick(date)}
                    title="刪除此日紀錄"
                    onMouseOver={e=>e.currentTarget.style.opacity=1}
                    onMouseOut={e=>e.currentTarget.style.opacity=0.6}
                  >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                  </button>
                )}
              </>
            ) : (
              <div style={{flex:1,marginLeft:"12px",fontSize:"14px",color:"var(--t3)"}}>—</div>
            )}
          </div>
        );
      })}
      {showStats && <StatsPanel weekly={weekly} isDark={isDark} userTitles={userTitles} boundName={boundName} onTitleChange={onTitleChange} mySpecialAchievements={mySpecialAchievements} titleShopConfig={titleShopConfig} />}
    </div>
  );
}

                    </div>
                  );
                })
            }
          </div>
        )}
        <div style={{marginTop:"16px",borderTop:"1px solid var(--b1)",paddingTop:"12px",flexShrink:0}}>
          <button className="ghost btn-danger" onClick={onLogout} style={{width:"100%",marginBottom:0}}>登出</button>
        </div>
      </div>
    </div>
  );
}

/* ── Birthday Set Modal（補填生日） ── */
function BirthdaySetModal({ uid, onClose }) {
  const [bdMonth, setBdMonth] = React.useState("");
  const [bdDay, setBdDay] = React.useState("");
  const [err, setErr] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  async function confirm() {
    const m = parseInt(bdMonth), d = parseInt(bdDay);
    if (!m || !d || m < 1 || m > 12 || d < 1 || d > 31) { setErr("請輸入正確的月份與日期"); return; }
    setLoading(true); setErr("");
    try {
      const mmdd = `${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      await fSet(`userBirthdays/${uid}`, mmdd);
      onClose(mmdd);
    } catch(e) { setErr("儲存失敗，請重試"); }
    finally { setLoading(false); }
  }
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div className="card" style={{width:"320px",padding:"28px 24px",textAlign:"center"}}>
        <div style={{fontSize:"36px",marginBottom:"12px"}}>🎂</div>
        <h3 style={{marginBottom:"6px",fontSize:"17px"}}>設定你的生日</h3>
        <p style={{fontSize:"13px",color:"var(--t3)",marginBottom:"20px"}}>生日當天可以選 5 個號碼，中獎機率加倍！</p>
        <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
          <input type="number" min="1" max="12" value={bdMonth} onChange={e=>setBdMonth(e.target.value)} placeholder="月" style={{flex:1,textAlign:"center",marginBottom:0}} />
          <span style={{lineHeight:"44px",color:"var(--t3)"}}>／</span>
          <input type="number" min="1" max="31" value={bdDay} onChange={e=>setBdDay(e.target.value)} placeholder="日" style={{flex:1,textAlign:"center",marginBottom:0}} />
        </div>
        {err && <p style={{color:"#ef4444",fontSize:"13px",marginBottom:"8px"}}>{err}</p>}
        <button className="primary" style={{width:"100%",marginBottom:"8px"}} onClick={confirm} disabled={loading}>
          {loading ? "儲存中…" : "確認"}
        </button>
        <button className="ghost" style={{width:"100%",fontSize:"13px"}} onClick={onClose}>略過</button>
      </div>
    </div>
  );
}

/* ── Set Name Screen ── */
function SetNameScreen({ user, activeTheme, onToggleDark, onNameSet }) {
  const suggested = (user.displayName || "").split(" ")[0];
  const [name, setName] = React.useState(suggested);
  const [bdMonth, setBdMonth] = React.useState("");
  const [bdDay, setBdDay] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState("");

  async function handleConfirm() {
    const n = name.trim();
    if (!n) { setErr("請輸入名稱"); return; }
    if (n.length > 20) { setErr("名稱最多 20 字"); return; }
    const m = parseInt(bdMonth), d = parseInt(bdDay);
    if (!m || !d || m < 1 || m > 12 || d < 1 || d > 31) { setErr("請輸入正確的生日（月／日）"); return; }
    setLoading(true); setErr("");
    try {
      const key = sanitizeKey(n);
      const existingUid = await fGet(`nameToUid/${key}`);
      if (existingUid && existingUid !== user.uid) {
        setErr(`「${n}」這個名字已有人使用，請換一個`);
        setLoading(false); return;
      }
      await fSet(`nameToUid/${key}`, user.uid);
      await fSet(`userNames/${user.uid}`, n);
      const mmdd = `${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      await fSet(`userBirthdays/${user.uid}`, mmdd);
      onNameSet(n);
    } catch(e) {
      setErr("儲存失敗，請再試一次"); setLoading(false);
    }
  }

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>
      <div className="site-header">
        <div className="site-header-inner">
          <div className="logo"><div className="logo-icon">◈</div><span>午餐大樂透</span></div>
          <button className="ghost theme-toggle" onClick={onToggleDark}>{THEMES[activeTheme]?.dark?"☀️":"🌙"}</button>
        </div>
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
        <div className="card fade-up" style={{width:"360px",maxWidth:"95vw",padding:"40px 32px"}}>
          <div style={{marginBottom:"28px"}}>
            <h2 style={{fontSize:"20px",marginBottom:"8px"}}>設定你的遊戲名稱</h2>
            <p>這個名字會顯示在排行榜與開獎結果上。<br/>若之前有使用過，請輸入<strong style={{color:"var(--t1)"}}>相同名字</strong>以保留紀錄。</p>
          </div>
          <label>遊戲名稱</label>
          <input value={name} onChange={e=>{setName(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&handleConfirm()}
            placeholder="輸入名字" maxLength={20} autoFocus />
          <label>生日（不填年份）</label>
          <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
            <input type="number" min="1" max="12" value={bdMonth} onChange={e=>setBdMonth(e.target.value)} placeholder="月" style={{marginBottom:0,flex:1,textAlign:"center"}} />
            <span style={{lineHeight:"44px",color:"var(--t3)"}}>／</span>
            <input type="number" min="1" max="31" value={bdDay} onChange={e=>setBdDay(e.target.value)} placeholder="日" style={{marginBottom:0,flex:1,textAlign:"center"}} />
          </div>
          {err && <p style={{color:"var(--red)",fontSize:"13px",marginTop:"-10px",marginBottom:"14px",fontWeight:"500"}}>{err}</p>}
          <button onClick={handleConfirm} disabled={loading}>
            {loading ? "確認中…" : "確認"}
          </button>
          <button className="ghost" onClick={()=>auth.signOut()} style={{fontSize:"13px",color:"var(--t3)"}}>登出，切換帳號</button>
        </div>
      </div>
    </div>
  );
}

/* ── 聊天室 + 在線人數（右下浮動） ── */
function ChatWidget({ boundName }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [online, setOnline] = useState({});
  const [text, setText] = useState("");
  const [unread, setUnread] = useState(0);
  const listRef = useRef(null);
  const seenTsRef = useRef(null);

  // TEST_MODE 假資料
  useEffect(() => {
    if (!TEST_MODE) return;
    setOnline({ Pocky: { name: "Pocky", active: true }, Eason: { name: "Eason", active: false }, Mina: { name: "Mina", active: true } });
    setMessages([
      { id: "t1", name: "Eason", text: "今天吃雞肉飯有人要一起嗎", ts: 1 },
      { id: "t2", name: "Mina", text: "+1 我也想吃", ts: 2 },
    ]);
  }, []);

  // 在線狀態（presence）
  useEffect(() => {
    if (!boundName || TEST_MODE) return;
    const key = sanitizeKey(boundName);
    const myRef = db.ref(`${DB_PREFIX}/presence/${key}`);
    const connRef = db.ref(".info/connected");
    const writePresence = (active) => myRef.set({ name: boundName, active });
    const onConn = snap => {
      if (snap.val() === true) {
        myRef.onDisconnect().remove();
        writePresence(document.visibilityState !== "hidden");
      }
    };
    connRef.on("value", onConn);
    const onVisibility = () => writePresence(document.visibilityState !== "hidden");
    document.addEventListener("visibilitychange", onVisibility);
    const presRef = db.ref(`${DB_PREFIX}/presence`);
    const onPres = snap => setOnline(snap.val() || {});
    presRef.on("value", onPres);
    return () => {
      connRef.off("value", onConn);
      presRef.off("value", onPres);
      document.removeEventListener("visibilitychange", onVisibility);
      myRef.onDisconnect().cancel();
      myRef.remove();
    };
  }, [boundName]);

  // 聊天訊息（最近 50 筆）
  useEffect(() => {
    if (TEST_MODE) return;
    const ref = db.ref(`${DB_PREFIX}/chat`).limitToLast(100);
    const handler = snap => {
      const val = snap.val() || {};
      const arr = Object.entries(val).map(([id, m]) => ({ id, ...m })).sort((a, b) => (a.ts || 0) - (b.ts || 0));
      setMessages(arr);
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  // 未讀計數
  useEffect(() => {
    if (!messages.length) return;
    const latestTs = messages[messages.length - 1].ts || 0;
    if (seenTsRef.current === null) { seenTsRef.current = latestTs; return; }
    if (open) { seenTsRef.current = latestTs; setUnread(0); }
    else setUnread(messages.filter(m => (m.ts || 0) > seenTsRef.current && m.name !== boundName).length);
  }, [messages, open, boundName]);

  // 自動捲到底
  useEffect(() => {
    if (open && listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
  }, [messages, open]);

  const send = () => {
    const t = text.trim();
    if (!t || !boundName) return;
    setText("");
    if (TEST_MODE) { setMessages(m => [...m, { id: "t" + m.length, name: boundName, text: t, ts: Date.now() }]); return; }
    const chatRef = db.ref(`${DB_PREFIX}/chat`);
    chatRef.push().set({ name: boundName, text: t, ts: firebase.database.ServerValue.TIMESTAMP }).then(() => {
      // 修剪舊訊息，避免 Firebase 無限增長（顯示 100 筆，DB 保留上限 500 筆）
      chatRef.orderByKey().once("value").then(snap => {
        const keys = [];
        snap.forEach(c => { keys.push(c.key); });
        if (keys.length > 500) {
          const updates = {};
          keys.slice(0, keys.length - 500).forEach(k => { updates[k] = null; });
          chatRef.update(updates);
        }
      });
    });
  };

  if (!boundName) return null;
  const onlineEntries = Object.values(online).map(v => typeof v === "string" ? { name: v, active: true } : v);
  const onlineCount = onlineEntries.length;

  if (!open) return (
    <button className="chat-bubble-btn" onClick={() => setOpen(true)} style={{ position: "fixed", bottom: "20px", right: "20px", zIndex: 9999, height: "48px", width: "auto", padding: "0 18px", borderRadius: "999px", background: "var(--a)", color: "#fff", border: "none", boxShadow: "0 4px 16px rgba(0,0,0,0.18)", display: "flex", alignItems: "center", gap: "8px", fontSize: "14px", fontWeight: "600", cursor: "pointer", marginBottom: 0 }}>
      💬 聊天
      <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: "#34C759", display: "inline-block" }}></span>
      <span style={{ fontSize: "12px", opacity: 0.9 }}>{onlineCount}</span>
      {unread > 0 && <span style={{ background: "#FF3B30", color: "#fff", borderRadius: "999px", minWidth: "18px", height: "18px", padding: "0 5px", fontSize: "11px", fontWeight: "700", display: "flex", alignItems: "center", justifyContent: "center" }}>{unread}</span>}
    </button>
  );

  return (
    <div style={{ position: "fixed", bottom: "20px", right: "20px", zIndex: 900, width: "330px", maxWidth: "calc(100vw - 32px)", height: "460px", maxHeight: "calc(100vh - 100px)", background: "var(--s1)", border: "1px solid var(--b1)", borderRadius: "16px", boxShadow: "0 8px 32px rgba(0,0,0,0.18)", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div style={{ padding: "12px 14px", borderBottom: "1px solid var(--b1)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontWeight: "700", fontSize: "15px", color: "var(--t1)" }}>💬 聊天室</div>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          <span style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "12px", color: "var(--t3)" }}><span style={{ width: "8px", height: "8px", borderRadius: "50%", background: "#34C759" }}></span>{onlineCount} 人在線</span>
          <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "16px", color: "var(--t3)", padding: 0, width: "auto", marginBottom: 0, boxShadow: "none" }}>✕</button>
        </div>
      </div>
      {onlineEntries.length > 0 && <div style={{ padding: "8px 14px", borderBottom: "1px solid var(--b1)", display: "flex", gap: "6px", flexWrap: "wrap" }}>
        {onlineEntries.map((e, i) => <span key={i} style={{ fontSize: "11px", color: "var(--t2)", background: "var(--s3)", border: "1px solid var(--b1)", borderRadius: "999px", padding: "2px 8px", display: "flex", alignItems: "center", gap: "4px" }}><span style={{ width: "7px", height: "7px", borderRadius: "50%", background: e.active ? "#34C759" : "#F5A623", flexShrink: 0 }}></span>{e.name}</span>)}
      </div>}
      <div ref={listRef} style={{ flex: 1, overflowY: "auto", padding: "12px 14px", display: "flex", flexDirection: "column", gap: "8px" }}>
        {messages.length === 0 && <div style={{ textAlign: "center", color: "var(--t3)", fontSize: "13px", marginTop: "20px" }}>還沒有訊息，來說點什麼吧</div>}
        {messages.map((m, i) => {
          const mine = m.name === boundName;
          const showName = !mine && (i === 0 || messages[i - 1].name !== m.name);
          const d = m.ts ? new Date(m.ts) : null;
          const now = new Date();
          const tsStr = d ? (d.toDateString() === now.toDateString()
            ? d.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", hour12: false })
            : `${d.getMonth()+1}/${d.getDate()} ${d.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", hour12: false })}`)
            : null;
          return <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start", gap: "2px" }}>
            {showName && <span style={{ fontSize: "11px", color: "var(--t3)", marginLeft: "2px" }}>{m.name}</span>}
            <span style={{ background: mine ? "var(--a)" : "var(--s3)", color: mine ? "#fff" : "var(--t1)", border: mine ? "none" : "1px solid var(--b1)", padding: "7px 11px", borderRadius: "12px", fontSize: "14px", maxWidth: "85%", wordBreak: "break-word", whiteSpace: "pre-wrap" }}>{m.text}</span>
            {tsStr && <span style={{ fontSize: "10px", color: "var(--t3)" }}>{tsStr}</span>}
          </div>;
        })}
      </div>
      <div style={{ padding: "10px 12px", borderTop: "1px solid var(--b1)", display: "flex", gap: "8px" }}>
        <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} maxLength={500} placeholder="輸入訊息…" style={{ flex: 1, marginBottom: 0 }} />
        <button onClick={send} disabled={!text.trim()} style={{ width: "auto", padding: "0 16px", marginBottom: 0, flexShrink: 0 }}>送出</button>
      </div>
    </div>
  );
}

function PointsHistoryModal({ open, onClose, boundName }) {
  const [logs, setLogs] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  React.useEffect(() => {
    if (!open || !boundName) return;
    if (TEST_MODE) {
      setLogs([
        { type:"participate", delta:10, note:"2026-06-24", ts: Date.now()-1000 },
        { type:"absent", delta:5, note:"2026-06-23", ts: Date.now()-86400000 },
        { type:"buy_card", delta:-50, note:"🃏 加號卡", ts: Date.now()-90000000 },
        { type:"admin", delta:20, note:"管理員調整", ts: Date.now()-172800000 },
      ]);
      return;
    }
    setLoading(true);
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    db.ref(`${DB_PREFIX}/pointsLog/${sanitizeKey(boundName)}`).orderByChild("ts").startAt(cutoff).limitToLast(200).once("value")
      .then(snap => {
        const val = snap.val() || {};
        const arr = Object.values(val).sort((a,b) => (b.ts||0) - (a.ts||0));
        setLogs(arr);
        setLoading(false);
      });
  }, [open, boundName]);
  if (!open) return null;
  const TYPE_META = {
    participate: { emoji:"🎯", label:"參加抽獎" },
    absent: { emoji:"🏠", label:"標記不參加" },
    admin: { emoji:"🎁", label:"管理員調整" },
    buy_card: { emoji:"🃏", label:"購買卡牌" },
    buy_title: { emoji:"🏅", label:"購買稱號" },
    buy_pet: { emoji:"🐾", label:"購買寵物" },
  };
  const grouped = {};
  for (const log of logs) {
    const d = log.ts ? new Date(log.ts) : null;
    const dateStr = d ? `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}` : "未知";
    if (!grouped[dateStr]) grouped[dateStr] = [];
    grouped[dateStr].push(log);
  }
  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"400px",width:"95vw",maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
          <div style={{fontSize:"18px",fontWeight:"700"}}>🪙 點數記錄</div>
          <button className="ghost btn-sm" onClick={onClose} style={{marginBottom:0}}>✕ 關閉</button>
        </div>
        <div style={{fontSize:"12px",color:"var(--t3)",marginBottom:"12px"}}>顯示近 30 天記錄</div>
        {loading ? (
          <div style={{textAlign:"center",padding:"32px",color:"var(--t3)"}}>載入中…</div>
        ) : logs.length === 0 ? (
          <div style={{textAlign:"center",padding:"32px",color:"var(--t3)"}}>近 30 天無記錄</div>
        ) : (
          Object.entries(grouped).map(([date, entries]) => (
            <div key={date} style={{marginBottom:"16px"}}>
              <div style={{fontSize:"12px",fontWeight:"600",color:"var(--t3)",marginBottom:"6px"}}>{date}</div>
              {entries.map((e,i) => {
                const meta = TYPE_META[e.type] || { emoji:"🪙", label:e.type };
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",borderRadius:"8px",background:"var(--s2)",marginBottom:"4px"}}>
                    <span style={{fontSize:"16px"}}>{meta.emoji}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:"500"}}>{meta.label}</div>
                      {e.note && <div style={{fontSize:"12px",color:"var(--t3)",marginTop:"1px"}}>{e.note}</div>}
                    </div>
                    <span style={{fontSize:"14px",fontWeight:"700",color:e.delta>0?"var(--a)":"#e53e3e",whiteSpace:"nowrap"}}>{e.delta>0?"+":""}{e.delta}</span>
                  </div>
                );
              })}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

  const [weather, setWeather] = useState({ loading: true, temp: null, pop: null, error: false });
  useEffect(() => {
    (async () => {
      try {
        const today = todayStr();
        const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-D0047-069?Authorization=${CWA_API_KEY}&locationName=新店區&elementName=T,PoP6h`);
        const data = await res.json();
        const location = data?.records?.Locations?.[0]?.Location?.find(l => l.LocationName === "新店區");
        if (!location) { setWeather({ loading: false, error: true, temp: null, pop: null }); return; }
        const elements = location.WeatherElement || [];
        // 溫度：取 12:00 與 13:00 平均
        const tempEl = elements.find(e => e.ElementName === "溫度");
        const temps = [];
        if (tempEl) {
          for (const t of tempEl.Time || []) {
            const dt = t.DataTime || "";
            if (!dt.startsWith(today)) continue;
            const h = parseInt(dt.slice(11, 13));
            if (h === 12 || h === 13) temps.push(parseInt(t.ElementValue?.[0]?.Temperature));
          }
        }
        const temp = temps.length > 0 ? Math.round(temps.reduce((a,b)=>a+b,0)/temps.length) : null;
        // 降雨機率：取 12:00 開始的 3 小時區間
        const popEl = elements.find(e => e.ElementName && e.ElementName.includes("降雨"));
        let pop = null;
        if (popEl) {
          for (const t of popEl.Time || []) {
            const start = t.StartTime || "";
            if (!start.startsWith(today)) continue;
            if (parseInt(start.slice(11, 13)) === 12) { pop = parseInt(t.ElementValue?.[0]?.ProbabilityOfPrecipitation); break; }
          }
        }
        setWeather({ loading: false, error: false, temp, pop });
      } catch(e) {
        setWeather({ loading: false, error: true, temp: null, pop: null });
      }
    })();

  async function doJoin() {

      let num2 = null;
      const activeCard = myCards.find(c => c.id === cardToUse);
      if (activeCard?.type === "extra_number") {
        num2 = parseInt(number2);
        if (!num2 || num2 < 1 || num2 > effectiveNumMax) return showToast(`第二個號碼請輸入 1 到 ${effectiveNumMax} 之間的整數`);
        if (num2 === num) return showToast("兩個號碼不能相同");
      }

      // 寵物相鄰號
      const petN = (!!userActivePet && petNumber) ? parseInt(petNumber) : null;
      if (petN && num2 && petN === num2) return showToast("寵物號碼與加號卡號碼重複，請重新選號");

      // 驗證生日額外號碼

      if (isBirthday && !isEditing) {
        const parsed = bdNumbers.map(v => parseInt(v));

        const allNums = [num, ...parsed, ...(num2 ? [num2] : []), ...(petN ? [petN] : [])];
        if (new Set(allNums).size !== allNums.length) return showToast("號碼不能重複");
        bdNums = parsed;
      }

        const today = todayStr();
        const otherPts = pts.filter(p => p.name !== name);

            const valid = Object.entries(cards).filter(([,c]) => c.expiresAt >= today);
            if (valid.length > 0) victims.push({ name: p.name, cards: valid });
          }
        }

          const victim = victims[Math.floor(Math.random() * victims.length)];
          const [cardId] = victim.cards[Math.floor(Math.random() * victim.cards.length)];
          // 原子取卡：僅當該卡仍在對方手牌時才偷走，避免與「對方剛好使用該卡」競態造成複製
          let stolen = null;
          await fRef(`userCards/${sanitizeKey(victim.name)}/${cardId}`).transaction(cur => {
            if (cur === null) return; // 已被使用或偷走，放棄
            stolen = cur;
            return null;              // 原子移除
          });
          if (stolen) {
            const newRef = fRef(`userCards/${sanitizeKey(name)}`).push();
            await newRef.set(stolen);
            stealSucceeded = true;
            if (stolen.type === "steal_card") { await fRef(`specialAchievements/${sanitizeKey(name)}/stealSteal`).set(true); setMySpecialAchievements(prev => ({...prev, stealSteal: true})); }
            showToast(`🎭 偷到了 ${victim.name} 的 ${CARD_TYPES[stolen.type]?.emoji}${CARD_TYPES[stolen.type]?.name}！`, 10000);
            await fRef(`stolenNotice/${sanitizeKey(victim.name)}`).set({ by: name, cardType: stolen.type, date: todayStr() });
          } else {
            showToast("🎭 想偷的卡剛好被用掉了，盜牌卡保留 😅");
          }
        } else {
          showToast("🎭 目前沒有人有卡可偷，盜牌卡保留 😅");
        }
      }

      // 盜牌卡只有成功偷到才算使用；其餘主動卡照常消耗
      const cardConsumed = activeCard && !PASSIVE_TYPES.includes(activeCard.type)
        && (activeCard.type !== "steal_card" || stealSucceeded);
      const nukedNumbers = (cardConsumed && activeCard.type === "nuke_card") ? getNukeZone(num, effectiveNumMax) : null;
      const cardExtra = cardConsumed
        ? { cardUsed: activeCard.type, ...(num2 ? { number2: num2 } : {}), ...(nukedNumbers ? { nukedNumbers } : {}) }
        : {};
      const bdExtra = bdNums ? { birthdayNumbers: bdNums } : {};
      const petExtra = petN ? { hasPet: true, petNumber: petN } : {};

      if (myEntry) {
        await fRef(`participants/${myEntry.id}`).update({category:form.category, rest, isRandomRest: isRandom||false});
        setIsEditing(false);
      } else {
        const newRef = fRef("participants").push();
        await newRef.set({id:newRef.key, name, category:form.category, rest, isRandomRest: isRandom||false, number:num, joinedAt:Date.now(), ...cardExtra, ...bdExtra, ...petExtra});
        await fRef(`participationCount/${sanitizeKey(name)}`).transaction(n => (n || 0) + 1);
      }
      if (form.rest==="cust" && rest) { await fRef(`restaurants_managed/${form.category}/${rest}`).set(true); }

      // 消耗卡牌（被動卡與未成功的盜牌卡不消耗）
      if (cardConsumed) {
        await returnCardToPool(name, activeCard.id);
        setCardToUse(""); setNumber2("");
      }
      // 公開卡：所有人號碼立即公開
      if (activeCard?.type === "reveal_numbers") {
        await fSet(`revealNumbers/${todayStr()}`, true);
      }

      // 隱藏成就：sameNumberStreak 追蹤（新加入時）
      if (!myEntry) {
        const sKey = sanitizeKey(name);
        const prevStreak = await fGet(`sameNumberStreak/${sKey}`) || { number: null, count: 0 };
        const newStreak = (num === prevStreak.number)
          ? { number: num, count: (prevStreak.count || 0) + 1 }
          : { number: num, count: 1 };
        await fSet(`sameNumberStreak/${sKey}`, newStreak);
      }
      // 隱藏成就：角落生物（新加入且押 1 或最大號碼，累計 5 次）
      if (!myEntry && (num === 1 || num === effectiveNumMax)) {
        const sKey = sanitizeKey(name);
        await fRef(`specialAchievements/${sKey}/cornerCount`).transaction(n => (n || 0) + 1);
        const count = await fGet(`specialAchievements/${sKey}/cornerCount`);
        if (!mySpecialAchievements?.cornerCreature && (count || 0) >= 5) {
          await fRef(`specialAchievements/${sKey}/cornerCreature`).set(true);
          setMySpecialAchievements(prev => ({...prev, cornerCreature: true}));
          showToast("🎉 隱藏成就解鎖：🐚 角落生物！", 5000);
          setHasNewAchievement(true);
        }
      }
      // 隱藏成就：末班車司機（截止前 60 秒內送出）
      if (!mySpecialAchievements?.lastMinuteDriver) {
        const [h, m] = s.deadline.split(":"); const target = new Date(); target.setHours(+h, +m, 0, 0);
        const remaining = target - new Date();
        if (remaining > 0 && remaining <= 60000) {
          await fRef(`specialAchievements/${sanitizeKey(name)}/lastMinuteDriver`).set(true);
          setMySpecialAchievements(prev => ({...prev, lastMinuteDriver: true}));
          showToast("🎉 隱藏成就解鎖：🚌 末班車司機！", 5000);
          setHasNewAchievement(true);
        }
      }

      try { localStorage.setItem("lunch_name", name); localStorage.setItem("lunch_joined_date", todayStr()); } catch(e) {}
      setPhase("joined");
    } catch (e) {
      showToast("加入失敗，請重試");
    } finally {
      setIsLoading(false);
    }
  }

  const isBuyingRef = React.useRef(false);

  async function buyFromShop(cardType, price) {
    if (!boundName || isBuyingRef.current) return;
    isBuyingRef.current = true;
    const key = sanitizeKey(boundName);
    const ct = CARD_TYPES[cardType];
    if (!ct) return;
    if (TEST_MODE) {
      const expireDays = CARD_DEFAULTS[cardType]?.expireDays ?? 30;
      const expDate = new Date(Date.now() + expireDays * 86400000);
      const expiresAt = `${expDate.getFullYear()}-${String(expDate.getMonth()+1).padStart(2,"0")}-${String(expDate.getDate()).padStart(2,"0")}`;
      const fakeId = `test_shop_${Date.now()}`;
      setMyCards(prev => [...prev, { id: fakeId, type: cardType, expiresAt, obtainedAt: todayStr() }]);
      setUserPoints(prev => (prev || 0) - price);
      return showToast(`已購買 ${ct.emoji}${ct.name}！`);
    }
    try {
      let stockOk = false;
      await fRef(`shopConfig/${cardType}/stock`).transaction(n => { if (!n || n <= 0) return; stockOk = true; return n - 1; });
      if (!stockOk) return showToast("商品已售罄");
      let pointsOk = false;
      await fRef(`userPoints/${key}`).transaction(n => { if ((n||0) < price) return; pointsOk = true; return (n||0) - price; });
      if (!pointsOk) {
        await fRef(`shopConfig/${cardType}/stock`).transaction(n => (n||0) + 1);
        return showToast("點數不足");
      }
      const expireDays = CARD_DEFAULTS[cardType]?.expireDays ?? 30;
      const expDate = new Date(Date.now() + expireDays * 86400000);
      const expiresAt = `${expDate.getFullYear()}-${String(expDate.getMonth()+1).padStart(2,"0")}-${String(expDate.getDate()).padStart(2,"0")}`;
      await fRef(`userCards/${key}`).push().set({ type: cardType, expiresAt, obtainedAt: todayStr() });
      logPointsEntry(key, "buy_card", -price, `${ct.emoji}${ct.name}`);
      showToast(`已購買 ${ct.emoji}${ct.name}！`);
    } catch(e) {
      showToast("購買失敗，請重試");
    } finally {
      isBuyingRef.current = false;
    }
  }

  async function buyTitle(titleKey, price, stock) {
    if (!boundName || isBuyingRef.current) return;
    isBuyingRef.current = true;
    const key = sanitizeKey(boundName);
    if (userOwnedTitles[titleKey]) return showToast("你已擁有此稱號");
    const cfg = titleShopConfig[titleKey];
    if (!cfg) return;
    try {
      if (TEST_MODE) {
        setUserOwnedTitles(prev => ({ ...prev, [titleKey]: true }));
        setUserPoints(prev => (prev || 0) - price);
        return showToast(`已購買稱號 ${cfg.emoji}${cfg.name}！`);
      }
      if (stock !== -1) {
        let stockOk = false;
        await fRef(`titleShopConfig/${titleKey}/stock`).transaction(n => { if (n === null || n <= 0) return; stockOk = true; return n - 1; });
        if (!stockOk) return showToast("稱號已售完");
      }
      let pointsOk = false;
      await fRef(`userPoints/${key}`).transaction(n => { if ((n||0) < price) return; pointsOk = true; return (n||0) - price; });
      if (!pointsOk) {
        if (stock !== -1) await fRef(`titleShopConfig/${titleKey}/stock`).transaction(n => (n||0) + 1);
        return showToast("點數不足");
      }
      await fRef(`userOwnedTitles/${key}/${titleKey}`).set(true);
      logPointsEntry(key, "buy_title", -price, `${cfg.emoji}${cfg.name}`);
      showToast(`已購買稱號 ${cfg.emoji}${cfg.name}！`);
    } catch(e) {
      showToast("購買失敗，請重試");
    } finally {
      isBuyingRef.current = false;
    }
  }

  async function buyTheme(themeId) {

    isBuyingRef.current = true;

        setOwnedThemes(prev => new Set([...prev, themeId]));

        activateTheme(themeId);
        return showToast("已購買主題 " + (THEMES[themeId]?.name || "") + "！");

      let pointsOk = false;
      await fRef(`userPoints/${key}`).transaction(n => { if ((n||0) < price) return; pointsOk = true; return (n||0) - price; });
      if (!pointsOk) { showToast("點數不足"); isBuyingRef.current = false; return; }
      await fRef(`userOwnedThemes/${key}/${themeId}`).set(true);

  async function doAbsent() {
    const name = form.name.trim();

    try {
      await fRef(`absent/${sanitizeKey(name)}`).set({name, absentAt: Date.now()});

        if (entry) {

          try { localStorage.removeItem("lunch_joined_date"); } catch(e) {}

      showToast("標記失敗，請重試");

      <div className="page fade-up">

        <HolidayBanner /><SpecialDayBanner /><BirthdayBanner todayBirthdays={todayBirthdays.map(b=>b.name)} />

              <div style={{marginBottom:"40px"}}><p className="section-label" style={{marginBottom:"12px"}}>今天的幸運號碼</p><div className={`result-number${result.nukedParticipants?.length>0?" result-number-scorched":""}`}>{drawnNumber}</div></div>
              {soloWin ? (
                <div style={{background:oc.bg,border:`1px solid ${oc.bd}`,borderRadius:"var(--r2)",padding:"24px",marginBottom:"24px",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:oc.top}} />
                  <span className="badge badge-gold" style={{marginBottom:"16px",display:"inline-flex"}}>{soloWinners.length > 1 ? `完全命中 · ${soloWinners.length} 人共贏` : "完全命中 · 獨贏"}</span>
                  {soloWinners.map((w,i) => (
                    <div key={i} style={{fontSize: soloWinners.length > 1 ? "22px" : "32px", fontWeight:"700",color:oc.h,marginBottom:"4px"}}>{w.name}</div>
                  ))}
                  <div style={{fontSize:"15px",fontWeight:"500",color:oc.sub,marginBottom:"20px",marginTop:"4px"}}>{winner.rest}{soloWinners.length > 1 && <span style={{fontSize:"12px",color:oc.p,marginLeft:"8px"}}>（抽籤決定）</span>}</div>
                  <div style={{height:"1px",background:oc.div,margin:"0 0 16px"}} />
                  {streak>=3 ? (
                    <p style={{marginTop:0,fontSize:"14px",color:oc.p}}>請客方案 · <span className="badge badge-gold" style={{marginRight:"6px"}}>🔥 {streak} 連勝加成</span>{isBirthdaySoloWin && <span className="badge" style={{marginRight:"6px",background:"rgba(236,72,153,0.15)",border:"1px solid rgba(236,72,153,0.4)",color:"#9D174D"}}>🎂 生日加倍</span>}每人 <strong style={{color:oc.str}}>{soloTreatPerPerson} 元</strong> · 共 {nonWinnerCount} 人，合計 {maxTotal} 元{soloWinners.length > 1 ? `，每位贏家得 ${perWinner} 元` : ""}</p>
                  ) : (
                    <p style={{marginTop:0,fontSize:"14px",color:oc.p}}>請客方案 · {isBirthdaySoloWin && <span className="badge" style={{marginRight:"6px",background:"rgba(236,72,153,0.15)",border:"1px solid rgba(236,72,153,0.4)",color:"#9D174D"}}>🎂 生日加倍</span>}每人最多 <strong style={{color:oc.str}}>{soloTreatPerPerson} 元</strong> · 共 {nonWinnerCount} 人，上限 {maxTotal} 元{soloWinners.length > 1 ? `，每位贏家得 ${perWinner} 元` : ""}</p>
                  )}
                </div>
              ) : (
                <div style={{background:gc.bg,border:`1px solid ${gc.bd}`,borderRadius:"var(--r2)",padding:"24px",marginBottom:"24px",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:gc.top}} /><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px",flexWrap:"wrap"}}><span className="badge badge-green" style={{display:"inline-flex"}}>最接近{streak>=3?` · 請客 ${treatAmount}元/人`:" · 各自付帳"}</span>{streak>=3&&<span className="badge badge-gold" style={{display:"inline-flex"}}>🔥 {streak} 連勝</span>}</div><div style={{fontSize:"28px",fontWeight:"700",color:gc.h,marginBottom:"8px"}}>{winner.rest}</div><div style={{fontSize:"15px",color:gc.sub}}>{result.followRestUser ? <>🍽️ <strong style={{color:gc.str,fontWeight:"600"}}>{result.followRestUser}</strong> 的跟著我吃卡</> : <>由 <strong style={{color:gc.str,fontWeight:"600"}}>{winner.name}</strong> 推薦</>}</div>{streak>=3&&<p style={{marginTop:"16px",fontSize:"14px",color:gc.sub}}>連續 {streak} 次最接近！每人補助 <strong style={{color:gc.str}}>{treatAmount} 元</strong> · 共 {pts.length-1-cheapskateUsers.length} 人付，合計 {treatAmount*(pts.length-1-cheapskateUsers.length)} 元{cheapskateUsers.length>0?`（${cheapskateUsers.length} 人免付卡免付）`:""}</p>}</div>
              )}
              {awardedCards.length > 0 && (
                <div style={{padding:"12px 16px",background:"var(--c-amber-bg)",border:"1px solid var(--c-amber-bd)",borderRadius:"10px",marginBottom:"16px",fontSize:"14px",color:"var(--c-amber-tx)"}}>
                  {awardedCards.filter(aw=>aw.name===form.name.trim()).map((aw,i) => (
                    <div key={i}>🃏 你獲得了 <strong>{CARD_TYPES[aw.type]?.emoji} {CARD_TYPES[aw.type]?.name}</strong>！</div>
                  ))}
                  <div style={{opacity:0.75}}>🎴 今日共發出 {awardedCards.length} 張卡牌</div>
                </div>
              )}
              {cheapskateUsers.length > 0 && (
                <div style={{padding:"12px 16px",background:"var(--c-orange-bg)",border:"1px solid var(--c-orange-bd)",borderRadius:"10px",marginBottom:"16px",fontSize:"14px",color:"var(--c-orange-tx)"}}>
                  {cheapskateUsers.map((n,i) => (
                    <div key={i}>🤑 <strong>{n}</strong> 使用了免付卡，免除本次請客費</div>
                  ))}
                </div>
              )}
              {pts.filter(p=>p.cardUsed==="thirsty_card"&&!result.nukedParticipants?.some(n=>n.id===p.id)).map((p,i) => (
                <div key={i} style={{padding:"12px 16px",background:"var(--c-blue-bg)",border:"1px solid var(--c-blue-bd)",borderRadius:"10px",marginBottom:"16px",fontSize:"14px",color:"var(--c-blue-tx)"}}>
                  🥤 <strong>{p.name}</strong> 使用了口渴卡！所有參加者合請他一杯（上限 100 元），飲料由他自選
                </div>
              ))}
              {pts.filter(p=>p.cardUsed==="extra_number" && p.number2 && !p.birthdayNumbers?.length).map((p,i) => (
                <div key={i} style={{padding:"12px 16px",background:"var(--c-green-bg)",border:"1px solid var(--c-green-bd)",borderRadius:"10px",marginBottom:"16px",fontSize:"14px",color:"var(--c-green-tx)"}}>
                  ➕ <strong>{p.name}</strong> 使用了加號卡，本局選了 2 個號碼：#{p.number}、#{p.number2}
                </div>
              ))}
              {pts.filter(p=>p.birthdayNumbers?.length>0).map((p,i) => (
                <div key={i} style={{padding:"12px 16px",background:"var(--c-pink-bg)",border:"1px solid var(--c-pink-bd)",borderRadius:"10px",marginBottom:"16px",fontSize:"14px",color:"var(--c-pink-tx)"}}>
                  🎂 <strong>{p.name}</strong> 今天生日，本局選了 {1+(p.birthdayNumbers?.length||0)+(p.number2?1:0)} 個號碼：{[p.number,...(p.birthdayNumbers||[]),...(p.number2?[p.number2]:[])].map(n=>`#${n}`).join("、")}
                </div>
              ))}
              <div className="card" style={{marginBottom:"24px"}}><p className="section-label" style={{marginBottom:"16px"}}>本次排名</p>
                {allSorted.map((p,i) => {
                  const dist = Math.abs(p.number - drawnNumber), isWinner = (result.winners || [winner]).some(w => w.id === p.id), ramp = RAMPS[pts.findIndex(x=>x.id===p.id) % RAMPS.length];
                  const wr = isWinner ? (isDarkMode ? {bg:gc.bg,bd:gc.bd,tx:gc.h} : {bg:ramp.bg,bd:ramp.bd,tx:ramp.tx}) : null;
                  return (
                    <div key={p.id} style={{display:"flex",alignItems:"center",padding:"12px 16px",background:isWinner?wr.bg:"transparent",border:isWinner?`1px solid ${wr.bd}`:"1px solid transparent",borderRadius:"var(--r)",marginBottom:"6px"}}>
                      <span style={{fontSize:"13px",fontWeight:"500",color:"var(--t3)",width:"24px",flexShrink:0}}>{i+1}</span>
                      <div style={{flex:1,display:"flex",flexDirection:"column",gap:"2px",minWidth:0}}>
                        <span style={{fontWeight:isWinner?"600":"500",fontSize:"15px",color:isWinner?wr.tx:"var(--t1)",display:"flex",alignItems:"center",gap:"6px",overflow:"hidden"}}>
                          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                          {(() => { const a = getTitleDisplay(userTitles[sanitizeKey(p.name)], titleShopConfig); return a ? <span className="badge badge-title">{a.emoji} {a.name}</span> : null; })()}
                        </span>
                        <span style={{fontSize:"12px",color:isWinner?wr.tx:"var(--t3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.rest}</span>
                      </div>
                      <span style={{fontSize:"16px",fontWeight:"600",color:isWinner?wr.tx:"var(--t2)",marginRight:"16px",flexShrink:0}}>#{p.number}</span>
                      <span style={{fontSize:"13px",fontWeight:"500",color:isWinner?wr.tx:"var(--t3)",minWidth:"64px",textAlign:"right",flexShrink:0}}>{dist===0?"命中":`差 ${dist}`}</span>
                    </div>
                  );
                })}
              </div>
              {(result.nukedParticipants?.length > 0 || result.partialNukedParticipants?.length > 0) && (
                <div style={{padding:"12px 16px",background:isDarkMode?"rgba(239,68,68,0.08)":"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:"10px",marginBottom:"16px",fontSize:"14px"}}>
                  <div style={{fontWeight:"600",marginBottom:"6px",color:"rgba(239,68,68,0.9)"}}>☢️ 被核彈波及</div>
                  {result.nukedParticipants?.map((p,i) => (
                    <div key={i} style={{color:"var(--t3)"}}>💥 <strong style={{color:"var(--t2)"}}>{p.name}</strong>（#{p.number}）出局</div>
                  ))}
                  {result.partialNukedParticipants?.map((p,i) => (
                    <div key={i} style={{color:"var(--t3)"}}>💨 <strong style={{color:"var(--t2)"}}>{p.name}</strong> 的 {p.destroyedNumbers.map(n=>`#${n}`).join("、")} 被炸毀，以存活號碼繼續參賽</div>
                  ))}
                </div>
              )}
              {isAdmin && <button className="ghost" onClick={()=>{setConfirmModal(true);}} style={{width:"auto",padding:"12px 24px"}}>重新開始遊戲</button>}
            </div>
          </div>
        </div>
        <Footer />
      </div>
    );
  }
  return null;
}

window.onerror = (msg, src, line, col, err) => {
  document.getElementById("root").innerHTML = `<div style="padding:40px;text-align:center;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center"><p style="color:#e53e3e;font-size:16px;margin-bottom:8px">⚠️ 載入失敗</p><p style="font-size:12px;color:#666;margin-bottom:4px">${msg}</p><p style="font-size:11px;color:#999;margin-bottom:20px">${src} :${line}</p><button onclick="location.reload()" style="padding:8px 20px;border-radius:8px;border:none;background:#333;color:#fff;cursor:pointer;font-size:14px">重新整理</button></div>`;
};
ReactDOM.render(<App />, document.getElementById("root"));
document.getElementById("app-loading")?.remove();
</script>
</body>
</html>
