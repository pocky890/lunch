name: Lunch Draw Backup

on:
  schedule:
    - cron: '5 4 * * 1-5'  # 週一至週五 04:05 UTC = 台灣時間 12:05
  workflow_dispatch:         # 可在 GitHub 手動觸發（測試用）

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run draw script
        run: node .github/scripts/lunch-draw.js
        env:
          WEBHOOK_URL: ${{ secrets.LUNCH_WEBHOOK_URL }}
