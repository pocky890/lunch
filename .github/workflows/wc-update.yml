name: WC Data Update
# 世足賽已結束，暫停定時抓比數/賠率；下次辦賽事時把 schedule 區塊取消註解即可恢復
on:
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/update-wc.js
