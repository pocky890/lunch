name: WC Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/update-wc.js
        env:
          FD_KEY: ${{ secrets.FD_KEY }}
          ODDS_KEY: ${{ secrets.ODDS_KEY }}
